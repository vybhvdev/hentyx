<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookmarks - Hentyx</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <style>
    :root { --bg: #0a0a0a; --surface: #161616; --accent: #ed2553; --text: #e5e5e5; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
    header { background: #000; padding: 12px 15px; border-bottom: 1px solid var(--accent); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .back { color: var(--accent); text-decoration: none; font-size: 20px; }
    .header-title { font-weight: 900; font-size: 15px; color: var(--accent); flex: 1; letter-spacing: 1px; }
    .signout-btn { background: none; border: 1px solid #333; color: #888; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .signout-btn:hover { border-color: var(--accent); color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
    .card { background: var(--surface); border-radius: 4px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
    .cover-wrap { position: relative; padding-top: 140%; background: #000; cursor: pointer; }
    .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
    .card-title { padding: 8px; font-size: 10px; line-height: 1.2; height: 28px; overflow: hidden; text-align: center; color: #bbb; }
    .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); border: none; color: #ed2553; border-radius: 50%; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .status { text-align: center; padding: 60px 20px; color: #444; font-size: 14px; }
    .login-prompt { text-align: center; padding: 60px 20px; }
    .login-prompt a { color: var(--accent); font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back">←</a>
    <span class="header-title">MY BOOKMARKS</span>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </header>
  <div class="container">
    <div id="content"></div>
  </div>
  <script>
    const proxy = url => `/api/proxy?url=${encodeURIComponent(url)}`;

    async function removeBookmark(mangaId, el) {
      const sb = supabase.createClient('https://xsfyktusduhpyksucwqr.supabase.co', 'sb_publishable_w-pXx13cGW0BixJ6WAeCAQ_pKZm9yfM');
      const { data: { user } } = await sb.auth.getUser();
      await sb.from('bookmarks').delete().eq('user_id', user.id).eq('manga_id', String(mangaId));
      el.closest('.card').remove();
      if (!document.querySelector('.card')) {
        document.getElementById('content').innerHTML = '<div class="status">No bookmarks yet!</div>';
      }
    }

    async function loadBookmarks() {
      const user = await getUser();
      if (!user) {
        document.getElementById('content').innerHTML = `
          <div class="login-prompt">
            <p style="color:#666; margin-bottom:15px;">Sign in to see your bookmarks</p>
            <a href="auth.html">SIGN IN →</a>
          </div>`;
        return;
      }
      const sb = supabase.createClient('https://xsfyktusduhpyksucwqr.supabase.co', 'sb_publishable_w-pXx13cGW0BixJ6WAeCAQ_pKZm9yfM');
      const { data } = await sb.from('bookmarks').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      if (!data || data.length === 0) {
        document.getElementById('content').innerHTML = '<div class="status">No bookmarks yet! Start reading to save your favourites.</div>';
        return;
      }
      document.getElementById('content').innerHTML = `<div class="grid">${data.map(b => `
        <div class="card">
          <div class="cover-wrap" onclick="location.href='gallery.html?id=${b.manga_id}&cover=${encodeURIComponent(b.cover)}'">
            <img src="${proxy(b.cover)}" loading="lazy">
            <button class="remove-btn" onclick="event.stopPropagation(); removeBookmark('${b.manga_id}', this)" title="Remove">✕</button>
          </div>
          <div class="card-title">${b.title}</div>
        </div>`).join('')}</div>`;
    }

    loadBookmarks();
  </script>
</body>
</html>
