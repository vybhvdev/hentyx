<script>
// Ad Manager - frequency capping + geo + session tracking
window.HentyxAds = (function() {
    var POP_KEY = 'hx_pop_ts';
    var SESSION_KEY = 'hx_session_interactions';
    var PUSH_SHOWN_KEY = 'hx_push_shown';
    var POP_COOLDOWN = 24 * 60 * 60 * 1000; // 24h

    function getInteractions() { return parseInt(sessionStorage.getItem(SESSION_KEY) || '0'); }
    function bumpInteraction() { sessionStorage.setItem(SESSION_KEY, getInteractions() + 1); }
    function canShowPop() {
        var last = localStorage.getItem(POP_KEY);
        return !last || (Date.now() - parseInt(last)) > POP_COOLDOWN;
    }
    function markPopShown() { localStorage.setItem(POP_KEY, Date.now()); }
    function canShowPush() { return !localStorage.getItem(PUSH_SHOWN_KEY); }
    function markPushShown() { localStorage.setItem(PUSH_SHOWN_KEY, '1'); }

    function triggerPop() {
        if (canShowPop()) {
            markPopShown();
            // popunder fires via its own script on page load
        }
    }

    function onInteraction() {
        bumpInteraction();
        var n = getInteractions();
        // Trigger push prompt on 2nd interaction
        if (n === 2 && canShowPush()) {
            markPushShown();
            // PropellerAds push script handles the prompt
        }
    }

    // Track clicks globally
    document.addEventListener('click', onInteraction, { once: false, passive: true });

    return { triggerPop: triggerPop, onInteraction: onInteraction };
})();
</script>

  <script>
    const proxy = url => `/api/proxy?url=${encodeURIComponent(url)}`;

    async function removeBookmark(mangaId, el) {
      const sb = supabase.createClient('https://xsfyktusduhpyksucwqr.supabase.co', 'sb_publishable_w-pXx13cGW0BixJ6WAeCAQ_pKZm9yfM');
      const { data: { user } } = await sb.auth.getUser();
      await sb.from('bookmarks').delete().eq('user_id', user.id).eq('manga_id', String(mangaId));
      el.closest('.card').remove();
      if (!document.querySelector('.card')) {
        document.getElementById('content').innerHTML = '<div class="status">No bookmarks yet!</div>';
      }
    }

    async function loadBookmarks() {
      const user = await getUser();
      if (!user) {
        document.getElementById('content').innerHTML = `
          <div class="login-prompt">
            <p style="color:#666; margin-bottom:15px;">Sign in to see your bookmarks</p>
            <a href="auth.html">SIGN IN →</a>
          </div>`;
        return;
      }
      const sb = supabase.createClient('https://xsfyktusduhpyksucwqr.supabase.co', 'sb_publishable_w-pXx13cGW0BixJ6WAeCAQ_pKZm9yfM');
      const { data } = await sb.from('bookmarks').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      if (!data || data.length === 0) {
        document.getElementById('content').innerHTML = '<div class="status">No bookmarks yet! Start reading to save your favourites.</div>';
        return;
      }
      document.getElementById('content').innerHTML = `<div class="grid">${data.map(b => `
        <div class="card">
          <div class="cover-wrap" onclick="location.href='gallery.html?id=${b.manga_id}&cover=${encodeURIComponent(b.cover)}'">
            <img src="${proxy(b.cover)}" loading="lazy">
            <button class="remove-btn" onclick="event.stopPropagation(); removeBookmark('${b.manga_id}', this)" title="Remove">✕</button>
          </div>
          <div class="card-title">${b.title}</div>
        </div>`).join('')}</div>`;
    }

    loadBookmarks();
  </script>
