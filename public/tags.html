  <script>
    let allTags = [];

    async function loadTags() {
      const res = await fetch('/api/tags');
      allTags = await res.json();
      renderTags(allTags);
    }

    function renderTags(tags) {
      document.getElementById('tagCloud').innerHTML = tags.map(t => `
        <a href="index.html?q=${encodeURIComponent(t.name)}" class="tag">
          <span class="tag-dot"></span>${t.name}
        </a>
      `).join('');
    }

    function filterTags() {
      const q = document.getElementById('filterInput').value.toLowerCase();
      const filtered = allTags.filter(t => t.name.includes(q));
      renderTags(filtered);
    }

    loadTags();
  </script>
