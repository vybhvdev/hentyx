<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx</title>
</head>
<body>
<header>
    <div class="menu-toggle" onclick="toggleDrawer()">☰</div>
    <a href="/" class="logo">HENTYX</a>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search...">
        <button onclick="search()">🔍</button>
    </div>
</header>
<div class="container">
    <h2 style="color:#ed2553; padding-left:10px;">Popular Now</h2>
    <div id="popularSection" class="gallery-grid" style="margin-bottom:40px;"></div>
    <h2 style="color:#ed2553; padding-left:10px;">New Uploads</h2>
    <div id="newSection" class="gallery-grid"></div>
</div>
<script>
    async function load() {
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q') || '';
        const r = await fetch('/api/galleries?q=' + q);
        const data = await r.json();
        
        const popularItems = data.items.slice(0, 5);
        const newItems = data.items.slice(5);

        const mapItem = g => `<div class="cover" onclick="location.href='reader.html?id=${g.id}'"><img src="${g.images[0]}"><div class="caption">${g.title}</div></div>`;

        document.getElementById('popularSection').innerHTML = popularItems.map(mapItem).join('');
        document.getElementById('newSection').innerHTML = newItems.map(mapItem).join('');
    }
    function search() { location.href = '/index.html?q=' + document.getElementById('searchInput').value; }
    load();
</script>
</body>
</html>
