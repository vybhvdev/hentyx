<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx | EH</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:sans-serif;">
<header style="background:#222; padding:15px; border-bottom:2px solid #ed2553; text-align:center;">
    <span style="color:#ed2553; font-weight:bold; font-size:22px; letter-spacing:2px;">HENTYX</span>
</header>
<div id="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;"></div>
<script>
    fetch('/api/galleries?v=' + Date.now()).then(r => r.json()).then(data => {
        document.getElementById('grid').innerHTML = data.map(g => `
            <div onclick="location.href='reader.html?gid=${g.gid}&token=${g.token}'" style="background:#222; border-radius:8px; overflow:hidden;">
                <img src="${g.thumb}" style="width:100%; aspect-ratio:45/64; object-fit:cover;">
                <div style="padding:8px; font-size:11px; height:35px; overflow:hidden;">${g.title}</div>
            </div>`).join('');
    });
</script>
</body>
</html>
