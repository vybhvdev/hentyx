<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx OS</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #ed2553; --text: #ffffff; --text-muted: #aaaaaa; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background-color: var(--surface); padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .search-bar { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--surface); border-radius: 8px; overflow: hidden; text-decoration: none; color: white; transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border: 1px solid var(--primary); }
        .cover-wrapper { position: relative; padding-top: 140%; background: #333; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-title { padding: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #loading { text-align: center; padding: 50px; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <div class="brand">Hentyx OS</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search manga or doujinshi..." value="doujinshi">
            <button onclick="loadGalleries()">SEARCH</button>
        </div>
    </header>

    <div id="loading">Fetching Data...</div>
    <div class="grid" id="grid"></div>

    <script>
        // Allow pressing "Enter" to search
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                loadGalleries();
            }
        });

        async function loadGalleries() {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const query = document.getElementById('searchInput').value || 'doujinshi';
            
            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                // We now pass the query to our backend!
                const response = await fetch(`/api/galleries?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                loading.style.display = 'none';

                if (!data || data.length === 0 || data.error) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center;">No results found. Try a different search.</div>`;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('a');
                    card.href = `reader.html?id=${item.id}`;
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="cover-wrapper"><img src="${item.cover}" loading="lazy" referrerpolicy="no-referrer"></div>
                        <div class="card-title">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.style.display = 'none';
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ed2553;">API Error.</div>`;
            }
        }
        loadGalleries();
    </script>
</body>
</html>
