<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #ed2553; --text: #ffffff; --text-muted: #aaaaaa; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: all 0.3s ease; }
        
        /* -- 1. Landing Page Mode -- */
        body.landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        body.landing header { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; background: transparent; border: none; padding: 20px; }
        body.landing .brand { font-size: 3.5rem; margin-bottom: 30px; text-shadow: 0 0 20px rgba(237, 37, 83, 0.4); letter-spacing: 2px; }
        body.landing .search-bar { width: 100%; flex-direction: row; }
        body.landing input { padding: 15px; font-size: 1.1rem; border-radius: 8px 0 0 8px; flex: 1; }
        body.landing button { padding: 15px 30px; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
        body.landing #grid, body.landing #loading { display: none !important; }

        /* -- 2. Browsing Mode -- */
        body.browsing header { background-color: var(--surface); padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        body.browsing .brand { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; text-align: left; text-shadow: none; }
        body.browsing .search-bar { display: flex; gap: 10px; width: 100%; }
        body.browsing input { flex: 1; padding: 10px; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        body.browsing button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Grid Styles */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--surface); border-radius: 8px; overflow: hidden; text-decoration: none; color: white; transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border: 1px solid var(--primary); }
        .cover-wrapper { position: relative; padding-top: 140%; background: #333; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-title { padding: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #loading { text-align: center; padding: 50px; color: var(--text-muted); }
    </style>
</head>
<body class="landing">

    <header>
        <div class="brand">Hentyx</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for titles...">
            <button onclick="triggerSearch()">SEARCH</button>
        </div>
    </header>

    <div id="loading">Fetching Data...</div>
    <div class="grid" id="grid"></div>

    <script>
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                triggerSearch();
            }
        });

        function triggerSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return; // Do nothing if the search bar is empty

            // The Magic: Switch from Landing Mode to Browsing Mode
            document.body.className = 'browsing';
            
            // Now load the data
            loadGalleries(query);
        }

        async function loadGalleries(query) {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            
            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch(`/api/galleries?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                loading.style.display = 'none';

                if (!data || data.length === 0 || data.error) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center;">No results found. Try another search.</div>`;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('a');
                    card.href = `gallery.html?id=${item.id}`;
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="cover-wrapper"><img src="${item.cover}" loading="lazy" alt="cover"></div>
                        <div class="card-title">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.style.display = 'none';
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ed2553;">API Error.</div>`;
            }
        }
        
        // Notice: The loadGalleries() function is NO LONGER called automatically on startup!
    </script>
</body>
</html>
