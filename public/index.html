<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:sans-serif;">
<header style="background:#222; padding:15px; border-bottom:2px solid #ed2553;"><a href="/" style="color:#ed2553; text-decoration:none; font-weight:bold;">HENTYX</a></header>
<div class="container"><div id="grid" class="gallery-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;"></div></div>
<script>
    // Updated Proxy call to avoid triple-encoding
    const PROXY = "https://hentyx-proxy.vaibhavyadav8900.workers.dev/?url=";
    
    fetch('/api/galleries?v=' + Date.now()).then(r => r.json()).then(d => {
        document.getElementById('grid').innerHTML = d.items.map(g => {
            // Force the thumb URL to be standard
            let thumb = g.images[0].replace('i3.', 't.').replace('i5.', 'i.');
            return `
            <div class="cover" onclick="location.href='reader.html?id=${g.id}'" style="background:#222; border-radius:5px; overflow:hidden;">
                <img src="${PROXY}${thumb}" 
                     style="width:100%; aspect-ratio:45/64; object-fit:cover;"
                     onerror="this.src='https://placehold.co/200x300?text=Reload_Page'">
                <div class="caption" style="padding:5px; font-size:11px; height:30px; overflow:hidden;">${g.title}</div>
            </div>`;
        }).join('');
    });
</script>
</body>
</html>
