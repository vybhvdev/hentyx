<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { 
            --bg: #121212; 
            --surface: #1e1e1e; 
            --accent: #ff00ff; 
            --text: #e5e5e5; 
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        
        header { 
            background: #000; padding: 15px; border-bottom: 1px solid var(--accent); 
            display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; text-align: center; }
        
        .search-container { display: flex; width: 100%; }
        input { 
            flex: 1; padding: 12px; background: #222; border: 1px solid #333; 
            color: #fff; border-radius: 4px 0 0 4px; outline: none; 
        }
        .search-btn { 
            background: var(--accent); color: #000; border: none; 
            padding: 0 15px; font-weight: bold; cursor: pointer; border-radius: 0 4px 4px 0;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        /* FORCED GRID LAYOUT */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            width: 100%;
        }
        
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }

        .card { 
            background: var(--surface); border-radius: 3px; overflow: hidden; 
            text-decoration: none; color: inherit; position: relative;
            border: 1px solid #222; display: flex; flex-direction: column;
        }
        
        .cover-wrap { position: relative; padding-top: 140%; background: #000; width: 100%; }
        .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        .lang-badge {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.8); color: var(--accent);
            padding: 2px 5px; border-radius: 2px; font-size: 9px; font-weight: bold;
            border: 1px solid var(--accent); z-index: 2;
        }

        .card-title { 
            padding: 6px; font-size: 10px; line-height: 1.2; height: 28px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; text-align: center;
        }

        #loading { text-align: center; padding: 50px; color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search...">
            <button class="search-btn" onclick="triggerSearch()">GO</button>
        </div>
    </header>

    <div class="container">
        <div id="loading">CONNECTING...</div>
        <div id="grid" class="grid"></div>
    </div>

    <script>
        async function loadGalleries(query = "") {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                // If query is empty, default to "new" to ensure the API returns results
                const apiQuery = query || "new"; 
                const res = await fetch(`/api/galleries?q=${encodeURIComponent(apiQuery)}`);
                const data = await res.json();
                
                loading.style.display = 'none';

                if (!data || data.length === 0) {
                    loading.innerText = "NO RESULTS FOUND.";
                    loading.style.display = 'block';
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('a');
                    card.href = `gallery.html?id=${item.id}&cover=${encodeURIComponent(item.cover)}`;
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="cover-wrap">
                            <img src="${item.cover}" loading="lazy">
                            <div class="lang-badge">${item.lang || 'JP'}</div>
                        </div>
                        <div class="card-title">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.innerText = "OFFLINE.";
            }
        }
        
        function triggerSearch() {
            loadGalleries(document.getElementById('searchInput').value.trim());
        }

        loadGalleries();
    </script>
</body>
</html>
