<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx | EH</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:sans-serif; margin:0;">
<header style="background:#111; padding:15px; border-bottom:2px solid #ed2553; text-align:center;">
    <span style="color:#ed2553; font-weight:bold; font-size:22px; letter-spacing:2px;">HENTYX</span>
</header>
<div id="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;"></div>
<script>
    async function loadGrid() {
        const r = await fetch('/api/galleries?v=' + Date.now());
        const data = await r.json();
        const grid = document.getElementById('grid');

        grid.innerHTML = data.map(g => `
            <div onclick="location.href='reader.html?gid=${g.gid}&token=${g.token}'" 
                 style="background:#222; border-radius:10px; overflow:hidden; border:1px solid #333; min-height:200px;">
                <img src="${g.thumb}" 
                     referrerpolicy="no-referrer"
                     style="width:100%; aspect-ratio:45/64; object-fit:cover; display:block;"
                     onerror="this.src='https://placehold.co/200x300?text=Reload_Page'">
                <div style="padding:10px; font-size:11px; height:35px; overflow:hidden; background:rgba(0,0,0,0.5);">
                    ${g.title}
                </div>
            </div>`).join('');
    }
    loadGrid();
</script>
</body>
</html>
