<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx Reset</title>
</head>
<body style="background:#111; color:white; font-family:sans-serif; margin:0;">
<header style="background:#1a1a1a; padding:15px; border-bottom:2px solid #ed2553; text-align:center;">
    <span style="color:#ed2553; font-weight:bold; font-size:20px;">HENTYX STABLE</span>
</header>
<div id="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;"></div>
<script>
    const PROXY = "https://images.weserv.nl/?url=";
    fetch('/api/galleries?v=' + Date.now())
        .then(r => r.json())
        .then(data => {
            document.getElementById('grid').innerHTML = data.map(g => `
                <div onclick="location.href='reader.html?gid=${g.gid}&token=${g.token}'" style="background:#222; border-radius:10px; overflow:hidden; border:1px solid #333;">
                    <img src="${PROXY}${g.thumb.replace('https://', '')}" style="width:100%; aspect-ratio:45/64; object-fit:cover; display:block;">
                    <div style="padding:10px; font-size:12px; text-align:center;">${g.title}</div>
                </div>`).join('');
        });
</script>
</body>
</html>
