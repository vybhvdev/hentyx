<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx</title>
</head>
<body>
<header><a href="/" class="logo">HENTYX</a></header>
<div class="container"><div id="grid" class="gallery-grid"></div></div>
<script>
    fetch('/api/galleries').then(r=>r.json()).then(d=>{
        document.getElementById('grid').innerHTML = d.items.map(g=>`
            <div class="cover" onclick="location.href='reader.html?id=${g.id}'">
                <img src="${g.images[0]}" crossorigin="anonymous">
                <div class="caption">${g.title}</div>
            </div>`).join('');
    });
</script>
</body>
</html>
