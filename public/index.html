<!DOCTYPE html><html><head><title>Hentyx Reader</title><style>img{max-width:300px;height:auto;margin:5px;display:inline-block;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);}</style></head><body>
<h1>🔥 Hentyx Danbooru Reader</h1>
<input id="tags" value="rating:explicit blonde" placeholder="blonde, schoolgirl, anal..." style="width:400px;padding:10px;font-size:16px;">
<button onclick="load()" style="padding:10px 20px;font-size:16px;background:#ff6b9d;color:white;border:none;border-radius:5px;cursor:pointer;">Load Gallery</button>
<button onclick="random()" style="padding:10px 20px;font-size:16px;background:#4ecdc4;color:white;border:none;border-radius:5px;cursor:pointer;margin-left:10px;">Random</button>
<div id="gallery"></div>
<script>
async function api(path, params='') { return (await fetch(`${path}${params}`)).json(); }
async function load() {
  const tags = document.getElementById('tags').value;
  document.getElementById('gallery').innerHTML = '<p>Loading...</p>';
  const data = await api(`/api/search?q=${encodeURIComponent(tags)}`);
  document.getElementById('gallery').innerHTML = data.map(i => 
    `<img src="${i.full}" title="${i.tags.join(', ')} | Score: ${i.score}" onclick="this.style.maxWidth='90vw';this.style.cursor='zoom-out';">`
  ).join('');
}
async function random() {
  const data = await api('/api/random?tags=rating:explicit');
  document.getElementById('gallery').innerHTML = `<img src="${data.file_url}" style="width:90vw;">`;
}
load();
</script>
</body></html>
