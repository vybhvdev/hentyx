<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { 
            --bg: #121212; 
            --surface: #1e1e1e; 
            --accent: #ff00ff; /* Neon Pink/Purple */
            --text: #e5e5e5; 
            --text-muted: #888; 
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; }
        
        header { 
            background: #000; 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--accent); 
            display: flex; flex-direction: column; gap: 12px; 
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .brand { font-size: 26px; font-weight: 900; color: var(--accent); text-decoration: none; letter-spacing: -1px; }
        
        .search-container { display: flex; width: 100%; }
        input { 
            flex: 1; padding: 12px; background: #222; border: 1px solid #333; 
            color: #fff; border-radius: 4px 0 0 4px; outline: none; font-size: 14px;
        }
        input:focus { border-color: var(--accent); }
        .search-btn { 
            background: var(--accent); color: #000; border: none; 
            padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 0 4px 4px 0;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }

        .card { 
            background: var(--surface); border-radius: 4px; overflow: hidden; 
            text-decoration: none; color: inherit; transition: 0.2s;
            position: relative; border: 1px solid #222;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        
        .cover-wrap { position: relative; padding-top: 142%; background: #000; }
        .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        /* nhentai-style Language Badge */
        .lang-badge {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.8); color: var(--accent);
            padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;
            border: 1px solid var(--accent);
        }

        .card-title { 
            padding: 8px; font-size: 11px; line-height: 1.4; height: 32px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            text-align: center; background: rgba(0,0,0,0.5);
        }

        #loading { text-align: center; padding: 100px; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search galleries...">
            <button class="search-btn" onclick="triggerSearch()">SEARCH</button>
        </div>
    </header>

    <div class="container">
        <div id="loading">Establishing Connection...</div>
        <div id="grid" class="grid"></div>
    </div>

    <script>
        function triggerSearch() {
            loadGalleries(document.getElementById('searchInput').value.trim());
        }

        async function loadGalleries(query = "") {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                const res = await fetch(`/api/galleries?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                loading.style.display = 'none';

                data.forEach(item => {
                    const card = document.createElement('a');
                    card.href = `gallery.html?id=${item.id}&cover=${encodeURIComponent(item.cover)}`;
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="cover-wrap">
                            <img src="${item.cover}" loading="lazy">
                            <div class="lang-badge">${item.lang}</div>
                        </div>
                        <div class="card-title">${item.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.innerText = "LINK FAILED.";
            }
        }
        loadGalleries();
    </script>
</body>
</html>
