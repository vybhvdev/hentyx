<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="juicyads-site-verification" content="1b2ae5c661042730364d960266e80e9c">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ed2553">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #161616; --accent: #ed2553; --text: #e5e5e5; }
        :root.light { --bg: #f5f5f5; --surface: #ffffff; --accent: #ed2553; --text: #111111; }
        :root.light header { background: #fff; }
        :root.light .search-row { background: #fff; }
        :root.light .filter-bar { background: #fff; }
        :root.light input { background: #f0f0f0; border-color: #ddd; color: #111; }
        :root.light .drawer { background: #fff; }
        :root.light .drawer-item { color: #111; }
        :root.light .drawer-item:hover { background: #f5f5f5; }
        :root.light .drawer-header { color: var(--accent); }
        :root.light .f-btn { background: #eee; border-color: #ddd; color: #888; }
        :root.light .f-btn.active { background: #fde8ec; border-color: var(--accent); color: var(--accent); }
        :root.light .page-btn { background: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow-x: hidden; }
        header { background: #000; padding: 10px 15px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 5px; }
        .brand { font-size: 22px; font-weight: 900; color: var(--accent); text-decoration: none; flex: 1; text-align: center; }
        :root.light #brandX { color: #333; }
        .search-row { padding: 10px 15px; background: #000; display: flex; gap: 5px; border-bottom: 1px solid #222; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; }
        .go-btn { background: var(--accent); color: #fff; border: none; padding: 0 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #000; z-index: 2000; transition: 0.3s; border-right: 1px solid var(--accent); }
        .drawer.open { left: 0; }
        .drawer-header { padding: 30px 20px; border-bottom: 1px solid #222; font-size: 24px; font-weight: 900; color: var(--accent); }
        .drawer-item { display: block; padding: 15px 25px; color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; cursor: pointer; border-left: 4px solid transparent; }
        .drawer-item:hover { background: #111; border-left-color: var(--accent); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        .section-title { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 2px; margin: 20px 0 10px 5px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 10px; }
        .popular-grid { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .popular-grid::-webkit-scrollbar { display: none; }
        .pop-card { flex: 0 0 130px; border-radius: 4px; border: 1px solid #333; overflow: hidden; height: 180px; position: relative; }
        .pop-card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        .card { background: var(--surface); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; position: relative; }
        .cover-wrap { position: relative; padding-top: 140%; background: #000; }
        .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .card-title { padding: 8px; font-size: 10px; line-height: 1.2; height: 28px; overflow: hidden; text-align: center; color: #bbb; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 30px 0; }
        .filter-bar { padding: 8px 15px; background: #000; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #1a1a1a; overflow-x: auto; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-group { display: flex; gap: 4px; }
        .f-btn { background: #111; border: 1px solid #2a2a2a; color: #666; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.15s; }
        .f-btn.active { background: #1f0a10; border-color: var(--accent); color: var(--accent); }
        .f-divider { width: 1px; background: #222; margin: 0 4px; }
        .page-btn { background: #111; color: var(--accent); border: 1px solid var(--accent); padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">HENTY<span style="color:#fff">X</span></div>
        <a href="index.html" class="drawer-item">🏠 Home</a>
        <div class="drawer-item" onclick="goTrueRandom()">🎲 Random Gallery</div>
        <a href="popular.html" class="drawer-item">🔥 Popular</a>
        <a href="tags.html" class="drawer-item">🏷 Tags</a>
        <a href="history.html" class="drawer-item">📖 History</a>
        <a href="bookmarks.html" class="drawer-item">🔖 Bookmarks</a>
        <a href="auth.html" class="drawer-item" id="drawerAuthLink">👤 Sign In</a>
    </div>
    <header>
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <a href="index.html" class="brand">HENTY<span id="brandX">X</span></a>
        <button class="menu-btn" id="themeBtn" onclick="toggleTheme()" style="font-size:18px;">🌙</button>
    </header>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search galleries...">
        <button class="go-btn" onclick="triggerSearch()">GO</button>
    </div>
    <div class="filter-bar">
        <div class="filter-group">
            <button class="f-btn active" id="lang-all" onclick="setLang('all')">🌐 All</button>
            <button class="f-btn" id="lang-en" onclick="setLang('en')">🇬🇧 EN</button>
            <button class="f-btn" id="lang-jp" onclick="setLang('jp')">🇯🇵 JP</button>
        </div>
        <div class="f-divider"></div>
        <div class="filter-group">
            <button class="f-btn active" id="sort-default" onclick="setSort('default')">Default</button>
            <button class="f-btn" id="sort-az" onclick="setSort('az')">A→Z</button>
            <button class="f-btn" id="sort-za" onclick="setSort('za')">Z→A</button>
        </div>
    </div>
    <div class="container">
        <div class="section-title">🔥 Popular</div>
        <div class="popular-grid" id="popularGrid"></div>
        <div class="section-title" id="gridTitle">Recent Uploads</div>
        <div id="grid" class="grid"></div>
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">PREV</button>
            <span id="pageLabel">Page 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
        </div>
    </div>
    <script>
        let currentPage = 1, currentQuery = "", currentLang = 'all', currentSort = 'default';
        const proxy = (url) => `/api/proxy?url=${encodeURIComponent(url)}`;

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function skelCards(n) {
            return Array(n).fill(0).map(() => `
                <div class="card">
                    <div class="cover-wrap" style="background:linear-gradient(90deg,#161616 25%,#222 50%,#161616 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;"></div>
                    <div class="card-title" style="background:#222;border-radius:2px;height:12px;margin:8px;animation:shimmer 1.2s infinite;background-size:200% 100%;background-image:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%);"></div>
                </div>`).join('');
        }

        function skelPopular(n) {
            return Array(n).fill(0).map(() => `
                <div class="pop-card" style="background:linear-gradient(90deg,#161616 25%,#222 50%,#161616 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;"></div>
            `).join('');
        }

        async function loadPopular() {
            const cacheKey = 'hentyx_popular';
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) renderPopular(JSON.parse(cached));
            else document.getElementById('popularGrid').innerHTML = skelPopular(6);
            try {
                const res = await fetch('https://jandapress.onrender.com/pururin/search?key=popular&page=1');
                const data = await res.json();
                const mpop = (data.data || []).slice(0,8).map(m => ({ id: m.id || m.code, title: m.title, cover: m.image || m.cover }));
                sessionStorage.setItem(cacheKey, JSON.stringify(mpop));
                renderPopular(mpop);
            } catch(e) {}
        }

        function renderPopular(data) {
            document.getElementById('popularGrid').innerHTML = data.map(m => `
                <a href="gallery.html?id=${m.id}&cover=${encodeURIComponent(m.cover)}" class="pop-card">
                    <img src="${proxy(m.cover)}" loading="lazy">
                </a>
            `).join('');
        }

        async function loadGalleries(query = "", page = 1) {
            const grid = document.getElementById('grid');
            const cacheKey = 'hentyx_galleries_' + query + '_' + page;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) { renderGalleries(JSON.parse(cached), page); }
            else grid.innerHTML = skelCards(12);
            try {
                const langSuffix = currentLang === 'en' ? ' english' : currentLang === 'jp' ? ' japanese' : '';
                const res = await fetch('https://jandapress.onrender.com/pururin/search?key=' + encodeURIComponent((query || 'new') + langSuffix) + '&page=' + page);
                const data = await res.json();
                const mapped = (data.data || []).map(m => ({ id: m.id || m.code, title: m.title, cover: m.image || m.cover }));
                sessionStorage.setItem(cacheKey, JSON.stringify(mapped));
                renderGalleries(mapped, page);
            } catch (err) {
                if (!cached) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px;color:#444;">OFFLINE.</div>';
            }
        }

        function setLang(lang) {
            currentLang = lang;
            ['all','en','jp'].forEach(l => document.getElementById('lang-'+l).classList.toggle('active', l === lang));
            sessionStorage.clear();
            currentPage = 1;
            loadGalleries(currentQuery);
        }

        function setSort(sort) {
            currentSort = sort;
            ['default','az','za'].forEach(s => document.getElementById('sort-'+s).classList.toggle('active', s === sort));
            const cached = sessionStorage.getItem('hentyx_galleries_' + currentQuery + '_' + currentPage);
            if (cached) renderGalleries(JSON.parse(cached), currentPage);
        }

        function renderGalleries(data, page) {
            let sorted = [...data];
            if (currentSort === 'az') sorted.sort((a,b) => a.title.localeCompare(b.title));
            else if (currentSort === 'za') sorted.sort((a,b) => b.title.localeCompare(a.title));
            document.getElementById('grid').innerHTML = sorted.map(m => `
                <a href="gallery.html?id=${m.id}&cover=${encodeURIComponent(m.cover)}" class="card">
                    <div class="cover-wrap"><img src="${proxy(m.cover)}" loading="lazy"></div>
                    <div class="card-title">${m.title}</div>
                </a>
            `).join('');
            document.getElementById('pageLabel').innerText = 'Page ' + page;
            document.getElementById('prevBtn').disabled = (page === 1);
        }

        function changePage(delta) { currentPage += delta; loadGalleries(currentQuery, currentPage); window.scrollTo(0,0); }
        function triggerSearch() { currentQuery = document.getElementById('searchInput').value.trim(); currentPage = 1; loadGalleries(currentQuery, 1); }
        async function goTrueRandom() {
            try {
                const keywords = ['english','uncensored','schoolgirl','milf','fantasy'];
                const rk = keywords[Math.floor(Math.random()*keywords.length)];
                const rp = Math.floor(Math.random()*5)+1;
                const res = await fetch('https://jandapress.onrender.com/pururin/search?key='+rk+'&page='+rp);
                const data = await res.json();
                const results = data.data || [];
                const pick = results[Math.floor(Math.random()*results.length)];
                window.location.href = 'gallery.html?id=' + (pick.id || pick.code) + '&cover=' + encodeURIComponent(pick.image || pick.cover);
            } catch(e) {}
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeBtn').innerText = isLight ? '☀️' : '🌙';
            document.getElementById('brandX').style.color = isLight ? '#333' : '#fff';
        }

        // Apply saved theme immediately
        (function() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('light');
                document.addEventListener('DOMContentLoaded', () => {
                    const btn = document.getElementById('themeBtn');
                    const x = document.getElementById('brandX');
                    if (btn) btn.innerText = '☀️';
                    if (x) x.style.color = '#333';
                });
            }
        })();

        if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
        window.onload = async () => {
            const user = await getUser();
            const drawerAuthLink = document.getElementById('drawerAuthLink');
            if (user) {
                drawerAuthLink.textContent = '👤 Sign Out';
                drawerAuthLink.href = '#';
                drawerAuthLink.onclick = () => signOut();
            }
            const qParam = new URLSearchParams(location.search).get('q');
            if (qParam) { document.getElementById('searchInput').value = qParam; currentQuery = qParam; }
            loadPopular();
            loadGalleries(currentQuery);
        };
    </script>
</body>
</html>
