<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #161616; --accent: #ed2553; --text: #e5e5e5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow-x: hidden; }
        header { background: #000; padding: 10px 15px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .menu-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 5px; }
        .brand { font-size: 22px; font-weight: 900; color: var(--accent); text-decoration: none; flex: 1; text-align: center; margin-right: 40px; }
        .search-row { padding: 10px 15px; background: #000; display: flex; gap: 5px; border-bottom: 1px solid #222; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; }
        .go-btn { background: var(--accent); color: #fff; border: none; padding: 0 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #000; z-index: 2000; transition: 0.3s; border-right: 1px solid var(--accent); }
        .drawer.open { left: 0; }
        .drawer-header { padding: 30px 20px; border-bottom: 1px solid #222; font-size: 24px; font-weight: 900; color: var(--accent); }
        .drawer-item { display: block; padding: 15px 25px; color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; cursor: pointer; border-left: 4px solid transparent; }
        .drawer-item:hover { background: #111; border-left-color: var(--accent); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        .section-title { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 2px; margin: 20px 0 10px 5px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 10px; }
        .popular-grid { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .popular-grid::-webkit-scrollbar { display: none; }
        .pop-card { flex: 0 0 130px; border-radius: 4px; border: 1px solid #333; overflow: hidden; height: 180px; position: relative; }
        .pop-card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        .card { background: var(--surface); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; position: relative; }
        .cover-wrap { position: relative; padding-top: 140%; background: #000; }
        .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .card-title { padding: 8px; font-size: 10px; line-height: 1.2; height: 28px; overflow: hidden; text-align: center; color: #bbb; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 30px 0; }
        .page-btn { background: #111; color: var(--accent); border: 1px solid var(--accent); padding: 10px 18px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">HENTY<span style="color:#fff">X</span></div>
        <a href="index.html" class="drawer-item">🏠 Home</a>
        <div class="drawer-item" onclick="goTrueRandom()">🎲 Random Gallery</div>
    </div>
    <header>
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a>
    </header>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search galleries...">
        <button class="go-btn" onclick="triggerSearch()">GO</button>
    </div>
    <div class="container">
        <div class="section-title">🔥 Popular</div>
        <div class="popular-grid" id="popularGrid"></div>
        <div class="section-title" id="gridTitle">Recent Uploads</div>
        <div id="grid" class="grid"></div>
        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">PREV</button>
            <span id="pageLabel">Page 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
        </div>
    </div>
    <script>
        let currentPage = 1, currentQuery = "";
        const proxy = (url) => `/api/proxy?url=${encodeURIComponent(url)}`;

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function loadPopular() {
            try {
                const res = await fetch('/api/popular');
                const data = await res.json();
                document.getElementById('popularGrid').innerHTML = data.map(m => `
                    <a href="gallery.html?id=${m.id}&cover=${encodeURIComponent(m.cover)}" class="pop-card"><img src="${proxy(m.cover)}"></a>
                `).join('');
            } catch(e) {}
        }

        async function loadGalleries(query = "", page = 1) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px;">LOADING...</div>';
            try {
                const res = await fetch(`/api/galleries?q=${encodeURIComponent(query || "new")}&p=${page}`);
                const data = await res.json();
                grid.innerHTML = data.map(m => `
                    <a href="gallery.html?id=${m.id}&cover=${encodeURIComponent(m.cover)}" class="card">
                        <div class="cover-wrap"><img src="${proxy(m.cover)}" loading="lazy"></div>
                        <div class="card-title">${m.title}</div>
                    </a>
                `).join('');
                document.getElementById('pageLabel').innerText = `Page ${page}`;
                document.getElementById('prevBtn').disabled = (page === 1);
            } catch (err) { grid.innerHTML = "OFFLINE."; }
        }

        function changePage(delta) { currentPage += delta; loadGalleries(currentQuery, currentPage); window.scrollTo(0,0); }
        function triggerSearch() { currentQuery = document.getElementById('searchInput').value.trim(); currentPage = 1; loadGalleries(currentQuery, 1); }
        async function goTrueRandom() { const res = await fetch('/api/random'); const data = await res.json(); window.location.href = `gallery.html?id=${data.id}`; }

        window.onload = () => {
            loadPopular();
            loadGalleries();
        };
    </script>
</body>
</html>
