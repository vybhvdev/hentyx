<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx</title>
    <style>
        :root { --bg: #0a0a0a; --surface: #161616; --accent: #ed2553; --text: #e5e5e5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background: #000; padding: 12px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; text-align: center; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        .section-title { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 2px; margin: 25px 0 10px 5px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        
        .card { background: var(--surface); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; transition: 0.2s; }
        .cover-wrap { position: relative; padding-top: 140%; background: #000; }
        .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .card-title { padding: 8px; font-size: 10px; height: 24px; overflow: hidden; text-align: center; color: #bbb; }
    </style>
</head>
<body>
    <header><a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a></header>
    <div class="container">
        <div class="section-title">🔥 Popular</div>
        <div id="popular" class="grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 30px;"></div>
        
        <div class="section-title">Recent Uploads</div>
        <div id="recent" class="grid"></div>
    </div>
    <script>
        const proxy = (url) => `/api/proxy?url=${encodeURIComponent(url)}`;

        async function load() {
            // Load Recent
            const res = await fetch('/api/galleries?q=new');
            const data = await res.json();
            const recent = document.getElementById('recent');
            const popular = document.getElementById('popular');
            
            recent.innerHTML = data.map(m => `
                <a href="gallery.html?id=${m.id}" class="card">
                    <div class="cover-wrap"><img src="${proxy(m.cover)}"></div>
                    <div class="card-title">${m.title}</div>
                </a>
            `).join('');

            // Fill Popular with the first 4 results
            popular.innerHTML = data.slice(0, 4).map(m => `
                <a href="gallery.html?id=${m.id}" class="card">
                    <div class="cover-wrap"><img src="${proxy(m.cover)}"></div>
                    <div class="card-title">${m.title}</div>
                </a>
            `).join('');
        }
        load();
    </script>
</body>
</html>
