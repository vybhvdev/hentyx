<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx Gallery</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ed2553; --surface: #161616; }
        body { background: var(--bg); color: #e5e5e5; margin: 0; font-family: sans-serif; }
        header { background: #000; padding: 15px; border-bottom: 1px solid var(--accent); text-align: center; position: sticky; top:0; z-index:100; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        
        /* COVER TOP LAYOUT */
        .cover-main { width: 100%; max-width: 320px; margin: 0 auto 15px; display: block; border-radius: 4px; border: 1px solid #333; }
        .title { font-size: 1.2rem; text-align: center; margin-bottom: 8px; color: #fff; line-height: 1.3; }
        .meta { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
        .accent { color: var(--accent); font-weight: bold; }
        
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 25px; }
        .tag { background: #1e1e1e; padding: 5px 10px; border-radius: 3px; font-size: 11px; border: 1px solid #333; color: #ccc; text-decoration: none; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn { padding: 14px; border-radius: 4px; text-decoration: none; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 13px; border: none; cursor: pointer; }
        .read-btn { background: var(--accent); color: #fff; }
        .dl-btn { background: #222; color: #fff; border: 1px solid #333; }

        .section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin: 30px 0 15px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* PREVIEWS */
        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .thumb { background: #000; position: relative; padding-top: 140%; border: 1px solid #222; overflow: hidden; }
        .thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .load-more { width: 100%; padding: 15px; background: #111; color: var(--accent); border: 1px solid #333; margin-top: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* RELATED (HOMEPAGE GRID STYLE) */
        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .related-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
        .rel-card { background: var(--surface); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; }
        .rel-cover { position: relative; padding-top: 140%; }
        .rel-cover img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
    </style>
</head>
<body>
    <header><a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:900; font-size:22px;">HENTY<span style="color:#fff">X</span></a></header>
    
    <div class="container" id="main" style="display:none;">
        <img id="cover" class="cover-main">
        <h1 id="title" class="title"></h1>
        <div class="meta">ID: <span class="accent" id="mid"></span> | <span class="accent" id="pcnt"></span> Pages</div>
        <div id="tags" class="tag-group"></div>
        
        <div class="action-btns">
            <a id="read" class="btn read-btn">Read Now</a>
            <button id="dl" class="btn dl-btn">Download ZIP</button>
        </div>

        <div class="section-title">Previews</div>
        <div id="previews" class="preview-grid"></div>
        <button id="more" class="load-more" onclick="render()">Load More</button>

        <div class="section-title">Related Galleries</div>
        <div id="related" class="related-grid"></div>
    </div>

    <script>
        const id = new URLSearchParams(location.search).get("id");
        let allPages = [], loaded = 0;

        async function init() {
            const res = await fetch(`/api/info?id=${id}`);
            const data = await res.json();
            allPages = data.pages;
            
            document.getElementById('main').style.display = 'block';
            document.getElementById('cover').src = `/api/proxy?url=${encodeURIComponent(data.cover)}`;
            document.getElementById('title').innerText = data.title;
            document.getElementById('mid').innerText = data.id;
            document.getElementById('pcnt').innerText = allPages.length;
            document.getElementById('read').href = `reader.html?id=${id}`;
            document.getElementById('dl').onclick = () => window.location.href = `/api/download?id=${id}&title=${encodeURIComponent(data.title)}`;
            
            document.getElementById('tags').innerHTML = data.tags.map(t => `<a href="index.html?q=${encodeURIComponent(t.name||t)}" class="tag">${t.name||t}</a>`).join('');
            
            render();
            loadRelated(data.tags[0]?.name || "doujinshi");
        }

        function render() {
            const grid = document.getElementById('previews');
            const batch = allPages.slice(loaded, loaded + 10);
            batch.forEach((url, i) => {
                const idx = loaded + i;
                const div = document.createElement('a');
                div.href = `reader.html?id=${id}&p=${idx}`;
                div.className = 'thumb';
                div.innerHTML = `<img src="/api/proxy?url=${encodeURIComponent(url)}" loading="lazy">`;
                grid.appendChild(div);
            });
            loaded += 10;
            if (loaded >= allPages.length) document.getElementById('more').style.display = 'none';
        }

        async function loadRelated(tag) {
            const res = await fetch(`/api/galleries?q=${encodeURIComponent(tag)}`);
            const data = await res.json();
            document.getElementById('related').innerHTML = data.slice(0, 8).map(item => `
                <a href="gallery.html?id=${item.id}" class="rel-card">
                    <div class="rel-cover"><img src="/api/proxy?url=${encodeURIComponent(item.cover)}"></div>
                    <div style="padding:5px; font-size:9px; text-align:center; height:20px; overflow:hidden;">${item.title}</div>
                </a>
            `).join('');
        }
        init();
    </script>
</body>
</html>
