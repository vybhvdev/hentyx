<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx - Gallery</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --accent: #ff00ff; --text: #e5e5e5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background: #000; padding: 15px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; display: block; text-align: center; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* INFO SECTION */
        .main-info { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }
        .cover-box img { width: 100%; max-width: 300px; border-radius: 4px; border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        .title { font-size: 1.4rem; margin: 15px 0 5px 0; line-height: 1.3; color: #fff; }
        .meta-bar { color: #888; font-size: 0.9rem; margin-bottom: 15px; display: flex; gap: 10px; }
        .accent-text { color: var(--accent); font-weight: bold; }

        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .tag { background: var(--surface); color: var(--text); padding: 5px 12px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #333; text-decoration: none; }
        
        .read-btn { display: block; background: var(--accent); color: #000; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }

        /* PREVIEW GRID */
        .preview-section { width: 100%; margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; }
        .section-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 600px) { .preview-grid { grid-template-columns: repeat(5, 1fr); gap: 12px; } }
        
        .thumb-card { background: #000; border-radius: 3px; overflow: hidden; border: 1px solid #222; position: relative; padding-top: 140%; text-decoration: none; }
        .thumb-card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .thumb-card:hover img { opacity: 1; transform: scale(1.05); }

        #loading { text-align: center; padding: 100px; color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>
    <header><a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a></header>
    
    <div id="loading">GATHERING DATA...</div>

    <div class="container" id="content" style="display: none;">
        <div class="main-info">
            <div class="cover-box"><img id="coverImg" src=""></div>
            <h1 class="title" id="mangaTitle"></h1>
            <div class="meta-bar">
                <span>ID: <span class="accent-text" id="mangaIdLabel"></span></span>
                <span>•</span>
                <span><span class="accent-text" id="pageCountLabel">0</span> pages</span>
            </div>
            <div class="tag-group" id="genresList"></div>
            <a href="#" id="readLink" class="read-btn">START READING</a>
        </div>

        <div class="preview-section">
            <div class="section-title">Previews</div>
            <div class="preview-grid" id="previewGrid"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const mangaId = params.get("id");
        const passedCover = params.get("cover");

        async function loadGallery() {
            if (!mangaId) return;
            try {
                const res = await fetch(`/api/info?id=${encodeURIComponent(mangaId)}`);
                const data = await res.json();
                
                // NO REPEAT ERROR FIX
                const pages = (data.pages && data.pages.length > 0) ? data.pages : (Array.isArray(data.cover) ? data.cover : []);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                document.getElementById('mangaTitle').innerText = data.title;
                document.getElementById('mangaIdLabel').innerText = data.id;
                document.getElementById('pageCountLabel').innerText = pages.length;
                document.getElementById('coverImg').src = passedCover || `/api/proxy?url=${encodeURIComponent(data.cover)}`;
                
                // Read link
                document.getElementById('readLink').href = `reader.html?id=${encodeURIComponent(mangaId)}`;

                // Tags
                const tagsHtml = (data.tags || []).map(t => {
                    const name = t.name || t;
                    return `<a href="index.html?q=${encodeURIComponent(name)}" class="tag">${name}</a>`;
                }).join('');
                document.getElementById('genresList').innerHTML = tagsHtml || '<span class="tag">N/A</span>';

                // PREVIEW GRID
                const previewGrid = document.getElementById('previewGrid');
                previewGrid.innerHTML = pages.map((url, index) => `
                    <a href="reader.html?id=${encodeURIComponent(mangaId)}&p=${index}" class="thumb-card">
                        <img src="/api/proxy?url=${encodeURIComponent(url)}" loading="lazy">
                    </a>
                `).join('');

            } catch (err) { document.getElementById('loading').innerText = "ERROR LOADING GALLERY."; }
        }
        loadGallery();
    </script>
</body>
</html>
