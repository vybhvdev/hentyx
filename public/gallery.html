<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx - Gallery</title>
    <style>
        :root { --bg: #1f1f1f; --surface: #2f2f2f; --primary: #ed2553; --text: #f3f3f3; --text-muted: #9e9e9e; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background-color: #111; padding: 15px 20px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; }
        .brand { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; text-decoration: none; letter-spacing: 1px; }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; }
        .cover-box { flex: 0 0 300px; }
        .cover-box img { width: 100%; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .info-box { flex: 1; }
        
        .title { font-size: 1.8rem; margin: 0 0 10px 0; line-height: 1.3; }
        .id-badge { display: inline-block; background: #111; padding: 5px 10px; border-radius: 5px; font-family: monospace; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 20px; }
        
        .desc { color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; font-size: 0.95rem; }
        
        .tag-group { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .tag-label { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; width: 80px; text-transform: capitalize; }
        .tag { background: var(--surface); color: var(--text); padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; text-decoration: none; display: inline-flex; transition: background 0.2s; }
        .tag:hover { background: var(--primary); }
        
        .read-btn { display: inline-block; background: var(--primary); color: white; padding: 15px 40px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; margin-top: 20px; transition: background 0.2s; border: none; cursor: pointer; text-align: center; }
        .read-btn:hover { background: #d11f46; }

        #loading { text-align: center; padding: 100px; font-size: 1.2rem; color: var(--text-muted); }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .cover-box { max-width: 250px; }
            .info-box { width: 100%; text-align: center; }
            .tag-group { flex-direction: column; align-items: center; }
            .tag-label { width: auto; margin-bottom: 5px; }
            .read-btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">Hentyx</a>
    </header>

    <div id="loading">Loading Gallery Data...</div>
    
    <div class="container" id="content" style="display: none;">
        <div class="cover-box">
            <img id="coverImg" src="" alt="Cover">
        </div>
        <div class="info-box">
            <h1 class="title" id="mangaTitle"></h1>
            <div class="id-badge">#<span id="mangaIdLabel"></span></div>
            
            <div class="tag-group">
                <span class="tag-label">Tags:</span>
                <div id="genresList"></div>
            </div>
            
            <p class="desc" id="mangaDesc"></p>
            
            <a href="#" id="readLink" class="read-btn">Read Now</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const mangaId = params.get("id");
        
        async function loadGallery() {
            if (!mangaId) {
                document.getElementById('loading').innerText = "No ID provided.";
                return;
            }

            try {
                // Fetch info from Mangapill via Consumet
                const res = await fetch(`https://private-consumet-api.vercel.app/manga/mangapill/info?id=${mangaId}`);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'flex';

                // Setup Cover (using the image proxy so it doesn't break!)
                const proxyUrl = `/api/proxy?url=${encodeURIComponent(data.image)}`;
                document.getElementById('coverImg').src = proxyUrl;
                
                // Setup Text
                document.getElementById('mangaTitle').innerText = data.title;
                document.getElementById('mangaIdLabel').innerText = data.id;
                document.getElementById('mangaDesc').innerText = data.description || "No description available.";
                
                // Setup Tags
                const genresHtml = (data.genres || []).map(g => `<span class="tag">${g}</span>`).join('');
                document.getElementById('genresList').innerHTML = genresHtml || '<span class="tag">N/A</span>';
                
                // Setup Read Button
                document.getElementById('readLink').href = `reader.html?id=${data.id}`;

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "Failed to load gallery info.";
            }
        }

        loadGallery();
    </script>
</body>
</html>
