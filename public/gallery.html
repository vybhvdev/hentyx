<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx - Gallery</title>
    <style>
        :root { --bg: #1f1f1f; --surface: #2f2f2f; --primary: #ed2553; --text: #f3f3f3; --text-muted: #9e9e9e; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background-color: #111; padding: 15px 20px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; text-decoration: none; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; }
        .cover-box { flex: 0 0 300px; }
        .cover-box img { width: 100%; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: #222; }
        .info-box { flex: 1; }
        .title { font-size: 1.6rem; margin: 0 0 10px 0; line-height: 1.3; }
        .id-badge { display: inline-block; background: #111; padding: 5px 10px; border-radius: 5px; font-family: monospace; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 20px; }
        .tag-group { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .tag { background: var(--surface); color: var(--text); padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; text-transform: capitalize; }
        .read-btn { display: inline-block; background: var(--primary); color: white; padding: 15px 40px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; margin-top: 20px; cursor: pointer; text-align: center; }
        #loading { text-align: center; padding: 100px; color: var(--text-muted); font-size: 1.2rem; }
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .cover-box { max-width: 250px; }
            .read-btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <header><a href="index.html" class="brand">Hentyx</a></header>
    <div id="loading">Loading Gallery Data...</div>
    
    <div class="container" id="content" style="display: none;">
        <div class="cover-box"><img id="coverImg" src="" alt="Cover"></div>
        <div class="info-box">
            <h1 class="title" id="mangaTitle"></h1>
            <div class="id-badge">#<span id="mangaIdLabel"></span></div>
            <div class="tag-group" id="genresList"></div>
            <a href="#" id="readLink" class="read-btn">Read Doujinshi</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const mangaId = params.get("id");
        const passedCover = params.get("cover");
        
        async function loadGallery() {
            if (!mangaId) return;
            try {
                // Fetch from our shiny new backend route
                const res = await fetch(`/api/info?id=${encodeURIComponent(mangaId)}`);
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'flex';

                const coverEl = document.getElementById('coverImg');
                coverEl.src = passedCover ? passedCover : `/api/proxy?url=${encodeURIComponent(data.cover)}`;
                
                document.getElementById('mangaTitle').innerText = data.title;
                document.getElementById('mangaIdLabel').innerText = data.id;
                
                const tagsHtml = (data.tags || []).map(g => `<span class="tag">${g.name || g}</span>`).join('');
                document.getElementById('genresList').innerHTML = tagsHtml || '<span class="tag">N/A</span>';
                
                // Read button goes straight to reader with just the ID
                document.getElementById('readLink').href = `reader.html?id=${encodeURIComponent(mangaId)}`;
            } catch (err) {
                document.getElementById('loading').innerText = "Failed to load gallery info.";
            }
        }
        loadGallery();
    </script>
</body>
</html>
