<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx - Gallery</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --accent: #ff00ff; --text: #e5e5e5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background: #000; padding: 15px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; display: block; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .cover-box img { width: 100%; max-width: 300px; border-radius: 5px; border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        .info-box { text-align: center; width: 100%; }
        .title { font-size: 1.4rem; margin-bottom: 10px; line-height: 1.3; color: #fff; }
        .id-badge { background: #000; padding: 5px 12px; border-radius: 4px; border: 1px solid #333; color: #888; font-family: monospace; margin-bottom: 20px; display: inline-block; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .tag { background: var(--surface); color: var(--text); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #333; }
        .read-btn { display: block; background: var(--accent); color: #000; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; width: 100%; box-sizing: border-box; }
        #loading { text-align: center; padding: 100px; color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>
    <header><a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a></header>
    <div id="loading">FETCHING DATA...</div>
    <div class="container" id="content" style="display: none;">
        <div class="cover-box"><img id="coverImg" src="" alt="Cover"></div>
        <div class="info-box">
            <h1 class="title" id="mangaTitle"></h1>
            <div class="id-badge">#<span id="mangaIdLabel"></span></div>
            <div class="tag-group" id="genresList"></div>
            <a href="#" id="readLink" class="read-btn">READ NOW</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(location.search);
        const mangaId = params.get("id");
        const passedCover = params.get("cover");
        async function loadGallery() {
            if (!mangaId) return;
            try {
                const res = await fetch(`/api/info?id=${encodeURIComponent(mangaId)}`);
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'flex';
                document.getElementById('coverImg').src = passedCover || `/api/proxy?url=${encodeURIComponent(data.cover)}`;
                document.getElementById('mangaTitle').innerText = data.title;
                document.getElementById('mangaIdLabel').innerText = data.id;
                const tagsHtml = (data.tags || []).map(t => `<span class="tag">${t.name || t}</span>`).join('');
                document.getElementById('genresList').innerHTML = tagsHtml || '<span class="tag">N/A</span>';
                document.getElementById('readLink').href = `reader.html?id=${encodeURIComponent(mangaId)}`;
            } catch (err) { document.getElementById('loading').innerText = "ERROR."; }
        }
        loadGallery();
    </script>
</body>
</html>
