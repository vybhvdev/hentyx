        .btn { padding: 12px; border-radius: 4px; text-decoration: none; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 13px; border: none; cursor: pointer; }

        .section-title { font-size: 13px; font-weight: bold; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #333; padding-top: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .thumb { background: #000; position: relative; padding-top: 140%; border: 1px solid #222; overflow: hidden; border-radius: 2px; display: block; }
        .thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .load-more { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: var(--accent); font-weight: bold; margin-top: 15px; cursor: pointer; border-radius: 4px; }
        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .related-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } }
        .rel-card { background: #1e1e1e; border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; }
        .rel-cover { position: relative; padding-top: 140%; background: #000; }
        .rel-cover img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .rel-title { padding: 6px; font-size: 10px; height: 24px; overflow: hidden; text-align: center; color: #bbb; }
        #loading { text-align: center; padding: 50px; color: var(--accent); font-family: monospace; font-size: 12px; }
        .share-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; border: 1px solid #333; }
        .share-toast.show { opacity: 1; }
    </style>

<script>
// Ad Manager - frequency capping + geo + session tracking
window.HentyxAds = (function() {
    var POP_KEY = 'hx_pop_ts';
    var SESSION_KEY = 'hx_session_interactions';
    var PUSH_SHOWN_KEY = 'hx_push_shown';
    var POP_COOLDOWN = 24 * 60 * 60 * 1000; // 24h

    function getInteractions() { return parseInt(sessionStorage.getItem(SESSION_KEY) || '0'); }
    function bumpInteraction() { sessionStorage.setItem(SESSION_KEY, getInteractions() + 1); }
    function canShowPop() {
        var last = localStorage.getItem(POP_KEY);
        return !last || (Date.now() - parseInt(last)) > POP_COOLDOWN;
    }
    function markPopShown() { localStorage.setItem(POP_KEY, Date.now()); }
    function canShowPush() { return !localStorage.getItem(PUSH_SHOWN_KEY); }
    function markPushShown() { localStorage.setItem(PUSH_SHOWN_KEY, '1'); }

    function triggerPop() {
        if (canShowPop()) {
            markPopShown();
            // popunder fires via its own script on page load
        }
    }

    function onInteraction() {
        bumpInteraction();
        var n = getInteractions();
        // Trigger push prompt on 2nd interaction
        if (n === 2 && canShowPush()) {
            markPushShown();
            // PropellerAds push script handles the prompt
        }
    }

    // Track clicks globally
    document.addEventListener('click', onInteraction, { once: false, passive: true });

    return { triggerPop: triggerPop, onInteraction: onInteraction };
})();
</script>

<div class="section-title" style="margin-top:40px;">Related Galleries</div>
        <div class="related-grid" id="relatedGrid"></div>

    <script>
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        const passedCover = params.get("cover");
        let allPages = [], loadedCount = 0;
        let galleryData = null;
        const proxy = (url) => `/api/proxy?url=${encodeURIComponent(url)}`;

        // Update header auth button
        async function initAuthHeader() {
            const user = await getUser();
            const btn = document.getElementById('authHeaderBtn');
            if (user) {
                btn.textContent = '🔖 Bookmarks';
                btn.href = 'bookmarks.html';
            }
        }

        // Check bookmark state and update button
        async function syncBookmarkBtn() {
            const saved = await isBookmarked(id);
            const btn = document.getElementById('bmBtn');
            btn.textContent = saved ? '❤ Saved' : '🔖 Save';
            btn.classList.toggle('saved', saved);
        }

        async function handleBookmark() {
            if (!galleryData) return;
            const user = await getUser();
            if (!user) { window.location.href = 'auth.html'; return; }
            const btn = document.getElementById('bmBtn');
            btn.textContent = '...';
            const added = await toggleBookmark({ id, title: galleryData.title, cover: galleryData.cover });
            btn.textContent = added ? '❤ Saved' : '🔖 Save';
            btn.classList.toggle('saved', added);
        }

        async function load() {
            // Set read link immediately with passed cover so reader works even before Render responds
            if (passedCover) {
                document.getElementById('readLink').href = `reader.html?id=${id}&cover=${encodeURIComponent(passedCover)}`;
            }
            try {
                const res = await fetch(`https://jandapress.onrender.com/pururin/get?book=${id}`);
                const data = await res.json();
                const d = data.data || data;
                allPages = Array.isArray(d.image) ? d.image : (Array.isArray(d.cover) ? d.cover : (d.reader || []));
                const thumb = typeof d.cover === "string" ? d.cover : (passedCover || allPages[0] || "");
                galleryData = { id: d.id, title: d.title, cover: thumb };

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                document.getElementById('mangaTitle').innerText = d.title;
                document.getElementById('mangaIdLabel').innerText = d.id;
                document.getElementById('pageCountLabel').innerText = allPages.length;
                document.getElementById('coverImg').src = proxy(thumb);
                document.getElementById("readLink").href = `reader.html?id=${id}&cover=${encodeURIComponent(galleryData.cover)}`;
                document.getElementById('dlBtn').onclick = () => window.location.href = `/api/download?id=${id}&title=${encodeURIComponent(data.title)}`;

                document.getElementById('genresList').innerHTML = (d.tags || []).map(t =>
                    `<a href="index.html?q=${encodeURIComponent(t.name || t)}" class="tag">${t.name || t}</a>`
                ).join('');

                // Preload pages into sessionStorage so reader opens instantly
                if (allPages.length > 0) {
                    sessionStorage.setItem('pages_' + id, JSON.stringify(allPages));
                    sessionStorage.setItem('title_' + id, d.title);
                    sessionStorage.setItem('cover_' + id, galleryData.cover);
                    // Prefetch first 3 images via proxy
                    allPages.slice(0, 3).forEach(url => {
                        const img = new Image();
                        img.src = '/api/proxy?url=' + encodeURIComponent(url);
                    });
                }
                renderNextBatch();
                loadRelated(d.tags && d.tags[0] ? (d.tags[0].name || d.tags[0]) : "doujinshi");
                syncBookmarkBtn();
                document.title = 'Hentyx - ' + d.title;
            } catch(e) {
                document.getElementById('loading').innerText = "FAILED TO LOAD.";
            }
        }

        function renderNextBatch() {
            const grid = document.getElementById('previewGrid');
            const batch = allPages.slice(loadedCount, loadedCount + 10);
            batch.forEach((url, i) => {
                const card = document.createElement('a');
                card.href = `reader.html?id=${id}&p=${loadedCount + i}&cover=${encodeURIComponent(url)}`;
                card.className = 'thumb';
                card.innerHTML = `<img src="${proxy(url)}" loading="lazy">`;
                grid.appendChild(card);
            });
            loadedCount += 10;
            if (loadedCount >= allPages.length) document.getElementById('loadMoreBtn').style.display = 'none';
        }

        async function loadRelated(tag) {
            const res = await fetch(`/api/galleries?q=${encodeURIComponent(tag)}`);
            const data = await res.json();
            document.getElementById('relatedGrid').innerHTML = data.slice(0, 6).map(item => `
                <a href="gallery.html?id=${item.id}&cover=${encodeURIComponent(item.cover)}" class="rel-card">
                    <div class="rel-cover"><img src="${proxy(item.cover)}" loading="lazy"></div>
                    <div class="rel-title">${item.title}</div>
                </a>
            `).join('');
        }

        initAuthHeader();
        load();

        function shareGallery() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('mangaTitle').innerText || 'Hentyx Gallery',
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    const t = document.getElementById('shareToast');
                    t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }).catch(() => {});
            }
        }
    </script>
    <div class="share-toast" id="shareToast">🔗 Link copied!</div>
</body>
