<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx - Gallery</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --accent: #ed2553; --text: #e5e5e5; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        header { background: #000; padding: 12px; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 100; text-align: center; }
        .brand { font-size: 22px; font-weight: 900; color: var(--accent); text-decoration: none; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        
        .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; text-align: center; } .cover-box { max-width: 250px; margin: 0 auto; } }
        .cover-box img { width: 100%; border-radius: 4px; border: 1px solid #333; }
        .title { font-size: 1.1rem; margin: 0 0 10px 0; color: #fff; font-weight: bold; }
        .meta { font-size: 12px; color: #888; margin-bottom: 10px; }
        .accent { color: var(--accent); font-weight: bold; }

        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        @media (max-width: 500px) { .tag-group { justify-content: center; } }
        .tag { background: #222; color: #ccc; padding: 5px 10px; border-radius: 4px; font-size: 11px; text-decoration: none; border: 1px solid #333; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn { padding: 12px; border-radius: 4px; text-decoration: none; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 13px; border: none; cursor: pointer; }
        .read-btn { background: var(--accent); color: #fff; }
        .dl-btn { background: #222; color: #fff; border: 1px solid #333; }

        .section-title { font-size: 13px; font-weight: bold; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #333; padding-top: 20px; }
        
        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .thumb { background: #000; position: relative; padding-top: 140%; border: 1px solid #222; overflow: hidden; border-radius: 2px; display: block; }
        .thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .load-more { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: var(--accent); font-weight: bold; margin-top: 15px; cursor: pointer; border-radius: 4px; }

        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .related-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } }
        .rel-card { background: #1e1e1e; border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; position: relative; }
        .rel-cover { position: relative; padding-top: 140%; background: #000; }
        .rel-cover img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .rel-title { padding: 6px; font-size: 10px; height: 24px; overflow: hidden; text-align: center; color: #bbb; }
        #loading { text-align: center; padding: 50px; color: var(--accent); font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <header><a href="index.html" class="brand">HENTY<span style="color:#fff">X</span></a></header>
    
    <div id="loading">LOADING GALLERY...</div>
    <div class="container" id="main" style="display:none;">
        <div class="info-grid">
            <div class="cover-box"><img id="coverImg" src=""></div>
            <div class="details">
                <h1 class="title" id="mangaTitle"></h1>
                <div class="meta">ID: <span class="accent" id="mangaIdLabel"></span> | Pages: <span class="accent" id="pageCountLabel"></span></div>
                <div class="tag-group" id="genresList"></div>
            </div>
        </div>
        
        <div class="action-btns">
            <a href="#" id="readLink" class="btn read-btn">Read Now</a>
            <button id="dlBtn" class="btn dl-btn">Download ZIP</button>
        </div>

        <div class="section-title">Previews</div>
        <div class="preview-grid" id="previewGrid"></div>
        <button id="loadMoreBtn" class="load-more" onclick="renderNextBatch()">Load More Pages</button>

        <div class="section-title" style="margin-top:40px;">Related Galleries</div>
        <div class="related-grid" id="relatedGrid"></div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        const passedCover = params.get("cover"); // YOUR FIX: Get working cover from Homepage
        
        let allPages = [], loadedCount = 0;
        const proxy = (url) => `/api/proxy?url=${encodeURIComponent(url)}`;

        async function load() {
            try {
                const res = await fetch(`/api/info?id=${id}`);
                const data = await res.json();
                
                // YOUR FIX: Apply the exact reader logic to get the pages
                allPages = (data.pages && data.pages.length > 0) ? data.pages : (Array.isArray(data.cover) ? data.cover : []);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                document.getElementById('mangaTitle').innerText = data.title;
                document.getElementById('mangaIdLabel').innerText = data.id;
                document.getElementById('pageCountLabel').innerText = allPages.length;
                
                // Use the working cover passed from homepage, with a proxy fallback just in case
                document.getElementById('coverImg').src = passedCover ? proxy(passedCover) : proxy(data.cover);
                
                document.getElementById('readLink').href = `reader.html?id=${id}`;
                document.getElementById('dlBtn').onclick = () => window.location.href = `/api/download?id=${id}&title=${encodeURIComponent(data.title)}`;

                document.getElementById('genresList').innerHTML = (data.tags || []).map(t => 
                    `<a href="index.html?q=${encodeURIComponent(t.name || t)}" class="tag">${t.name || t}</a>`
                ).join('');

                renderNextBatch();
                loadRelated(data.tags && data.tags[0] ? (data.tags[0].name || data.tags[0]) : "doujinshi");
            } catch(e) {
                document.getElementById('loading').innerText = "FAILED TO LOAD.";
            }
        }

        function renderNextBatch() {
            const grid = document.getElementById('previewGrid');
            const batch = allPages.slice(loadedCount, loadedCount + 10);
            batch.forEach((url, i) => {
                const card = document.createElement('a');
                card.href = `reader.html?id=${id}&p=${loadedCount + i}`;
                card.className = 'thumb';
                card.innerHTML = `<img src="${proxy(url)}" loading="lazy">`;
                grid.appendChild(card);
            });
            loadedCount += 10;
            if (loadedCount >= allPages.length) document.getElementById('loadMoreBtn').style.display = 'none';
        }

        async function loadRelated(tag) {
            const res = await fetch(`/api/galleries?q=${encodeURIComponent(tag)}`);
            const data = await res.json();
            document.getElementById('relatedGrid').innerHTML = data.slice(0, 6).map(item => `
                <a href="gallery.html?id=${item.id}&cover=${encodeURIComponent(item.cover)}" class="rel-card">
                    <div class="rel-cover"><img src="${item.cover.includes('/api/proxy') ? item.cover : proxy(item.cover)}" loading="lazy"></div>
                    <div class="rel-title">${item.title}</div>
                </a>
            `).join('');
        }
        load();
    </script>
</body>
</html>
