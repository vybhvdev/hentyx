<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx Gallery</title>
    <style>
        :root { --bg: #121212; --accent: #ed2553; }
        body { background: var(--bg); color: #e5e5e5; margin: 0; font-family: sans-serif; }
        header { background: #000; padding: 15px; border-bottom: 1px solid var(--accent); text-align: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .cover-main { width: 100%; max-width: 350px; margin: 0 auto 20px; display: block; border-radius: 4px; border: 1px solid #333; }
        .title { font-size: 1.3rem; text-align: center; margin-bottom: 10px; color: #fff; }
        .meta { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
        .accent { color: var(--accent); font-weight: bold; }
        
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 30px; }
        .tag { background: #1e1e1e; padding: 6px 12px; border-radius: 4px; font-size: 12px; border: 1px solid #333; color: #ccc; text-decoration: none; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px; }
        .btn { padding: 15px; border-radius: 4px; text-decoration: none; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 14px; border: none; cursor: pointer; }
        .read-btn { background: var(--accent); color: #fff; }
        .dl-btn { background: #333; color: #fff; border: 1px solid #444; }

        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .thumb { background: #000; position: relative; padding-top: 140%; border: 1px solid #222; overflow: hidden; }
        .thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        .load-more { width: 100%; padding: 15px; background: #222; color: var(--accent); border: 1px solid #333; margin-top: 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <header><a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:900; font-size:24px;">HENTY<span style="color:#fff">X</span></a></header>
    <div class="container" id="main" style="display:none;">
        <img id="cover" class="cover-main">
        <h1 id="title" class="title"></h1>
        <div class="meta">ID: <span class="accent" id="mid"></span> | <span class="accent" id="pcnt"></span> Pages</div>
        <div id="tags" class="tag-group"></div>
        
        <div class="action-btns">
            <a id="read" class="btn read-btn">Read Now</a>
            <button id="dl" class="btn dl-btn">Download ZIP</button>
        </div>

        <div style="font-size:12px; color:#888; text-transform:uppercase; margin-bottom:15px;">Previews</div>
        <div id="previews" class="preview-grid"></div>
        <button id="more" class="load-more" onclick="render()">Load More</button>
    </div>

    <script>
        const id = new URLSearchParams(location.search).get("id");
        let allPages = [], loaded = 0;

        async function init() {
            const res = await fetch(`/api/info?id=${id}`);
            const data = await res.json();
            allPages = data.pages;
            
            document.getElementById('main').style.display = 'block';
            document.getElementById('cover').src = `/api/proxy?url=${encodeURIComponent(data.cover)}`;
            document.getElementById('title').innerText = data.title;
            document.getElementById('mid').innerText = data.id;
            document.getElementById('pcnt').innerText = allPages.length;
            document.getElementById('read').href = `reader.html?id=${id}`;
            document.getElementById('dl').onclick = () => window.location.href = `/api/download?id=${id}&title=${encodeURIComponent(data.title)}`;
            
            document.getElementById('tags').innerHTML = data.tags.map(t => `<a href="index.html?q=${encodeURIComponent(t.name||t)}" class="tag">${t.name||t}</a>`).join('');
            render();
        }

        function render() {
            const grid = document.getElementById('previews');
            const batch = allPages.slice(loaded, loaded + 10);
            batch.forEach((url, i) => {
                const idx = loaded + i;
                const div = document.createElement('a');
                div.href = `reader.html?id=${id}&p=${idx}`;
                div.className = 'thumb';
                div.innerHTML = `<img src="/api/proxy?url=${encodeURIComponent(url)}" loading="lazy">`;
                grid.appendChild(div);
            });
            loaded += 10;
            if (loaded >= allPages.length) document.getElementById('more').style.display = 'none';
        }
        init();
    </script>
</body>
</html>
