    <style>
        :root { --bg: #212121; --nav-bg: #1f1f1f; --accent: #ed2553; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: sans-serif; overflow-x: hidden; color: #fff; }

        /* Top bar */
        .top-bar { background: var(--nav-bg); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .top-left { display: flex; align-items: center; gap: 8px; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 14px; }
        .mode-btn { background: #333; border: none; color: #aaa; padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .mode-btn.active { background: var(--accent); color: #fff; }
        .page-label { font-size: 13px; font-weight: bold; color: #aaa; }

        /* Page viewer */
        #viewer { position: relative; min-height: 90vh; display: flex; align-items: flex-start; justify-content: center; padding: 0; }
        #page-img { width: 100%; max-width: 800px; display: block; }

        /* Corner nav buttons - nhentai style */
        .corner-btn { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 32px; cursor: pointer; z-index: 50; padding: 20px 10px; border-radius: 4px; transition: background 0.2s; user-select: none; }
        .corner-btn:hover { background: rgba(237,37,83,0.7); }
        .corner-btn.left { left: 0; border-radius: 0 4px 4px 0; }
        .corner-btn.right { right: 0; border-radius: 4px 0 0 4px; }
        .corner-btn:disabled { opacity: 0.2; cursor: default; }

        /* Bottom bar */
        .bottom-bar { background: var(--nav-bg); padding: 12px 15px; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #333; margin-top: 10px; padding-bottom: 60px; }
        .nav-btn { background: #333; border: none; color: #fff; font-size: 20px; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.3; }

        /* Strip view */
        #strip-view { display: none; flex-direction: column; align-items: center; }
        #strip-view img { width: 100%; max-width: 800px; display: block; }

        /* Sticky ad */
        .ad-sticky { position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; z-index: 40; background: #000; padding: 3px 0; }

        /* Loading overlay */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; font-family: monospace; color: var(--accent); font-size: 14px; text-align: center; padding: 20px; }

        #preloader { display: none; }

<body>

<div id="loading-overlay">PREPARING GALLERY...</div>

<div class="top-bar">
    <div class="top-left">
        <a href="javascript:history.back()" class="back-btn">← BACK</a>
        <button class="mode-btn active" id="pageBtn" onclick="setMode('page')">Page</button>
        <button class="mode-btn" id="stripBtn" onclick="setMode('strip')">Strip</button>
    </div>
    <span class="page-label" id="pageLabel">— / —</span>
</div>

<!-- Corner navigation buttons -->
<button class="corner-btn left" id="prevBtn" onclick="changePage(-1)">‹</button>
<button class="corner-btn right" id="nextBtn" onclick="changePage(1)">›</button>

<div id="viewer">
    <img id="page-img" src="">
</div>

<div id="strip-view"></div>

<div class="bottom-bar" id="bottomBar">
    <button class="nav-btn" id="prevBtnBot" onclick="changePage(-1)">‹ Prev</button>
    <span id="pageLabelBot" style="font-size:13px;color:#aaa;">— / —</span>
    <button class="nav-btn" id="nextBtnBot" onclick="changePage(1)">Next ›</button>
</div>

<div class="ad-sticky">
    <script>atOptions={'key':'87a6a1e6810153943afb34a15a62c6f8','format':'iframe','height':50,'width':320,'params':{}};</script>
    <script src="https://www.highperformanceformat.com/87a6a1e6810153943afb34a15a62c6f8/invoke.js"></script>
</div>

<div id="preloader"></div>

<script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const passedCover = params.get("cover");
    const startPage = parseInt(params.get("p")) || 0;
    let pages = [];
    let currentIndex = startPage;
    let viewMode = 'page';

    const proxy = url => url.startsWith('/api/proxy') ? url : `/api/proxy?url=${encodeURIComponent(url)}`;

    function updateDisplay() {
        if (!pages.length) return;
        const img = document.getElementById('page-img');
        img.style.opacity = '0';
        img.src = proxy(pages[currentIndex]);
        img.onload = () => { img.style.opacity = '1'; img.style.transition = 'opacity 0.2s'; };
        const label = `${currentIndex + 1} / ${pages.length}`;
        document.getElementById('pageLabel').innerText = label;
        document.getElementById('pageLabelBot').innerText = label;
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex >= pages.length - 1;
        document.getElementById('prevBtnBot').disabled = currentIndex === 0;
        document.getElementById('nextBtnBot').disabled = currentIndex >= pages.length - 1;
        window.scrollTo(0, 0);
        preloadNext();
    }

    function preloadNext() {
        const preloader = document.getElementById('preloader');
        preloader.innerHTML = '';
        for (let i = 1; i <= 3; i++) {
            if (currentIndex + i < pages.length) {
                const img = new Image();
                img.src = proxy(pages[currentIndex + i]);
            }
        }
    }

    function changePage(step) {
        const next = currentIndex + step;
        if (next >= 0 && next < pages.length) {
            currentIndex = next;
            updateDisplay();
        }
    }

    function setMode(mode) {
        viewMode = mode;
        document.getElementById('pageBtn').classList.toggle('active', mode === 'page');
        document.getElementById('stripBtn').classList.toggle('active', mode === 'strip');
        document.getElementById('viewer').style.display = mode === 'page' ? 'flex' : 'none';
        document.getElementById('bottomBar').style.display = mode === 'page' ? 'flex' : 'none';
        document.getElementById('prevBtn').style.display = mode === 'page' ? 'block' : 'none';
        document.getElementById('nextBtn').style.display = mode === 'page' ? 'block' : 'none';
        const strip = document.getElementById('strip-view');
        if (mode === 'strip') {
            strip.style.display = 'flex';
            if (strip.children.length === 0) {
                pages.forEach(url => {
                    const img = document.createElement('img');
                    img.src = proxy(url);
                    img.loading = 'lazy';
                    strip.appendChild(img);
                });
            }
        } else {
            strip.style.display = 'none';
        }
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown") changePage(1);
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") changePage(-1);
    });

    function removeOverlay() {
        const o = document.getElementById('loading-overlay');
        if (o) o.remove();
    }

    function loadFromCache() {
        const cached = sessionStorage.getItem('pages_' + id);
        if (cached) {
            pages = JSON.parse(cached);
            currentIndex = Math.min(startPage, pages.length - 1);
            removeOverlay();
            updateDisplay();
            return true;
        }
        return false;
    }

    async function load(attempt) {
        attempt = attempt || 1;

        // Try cache first
        if (attempt === 1 && loadFromCache()) return;

        // Show cover immediately
        if (attempt === 1 && passedCover) {
            pages = [decodeURIComponent(passedCover)];
            currentIndex = 0;
            removeOverlay();
            updateDisplay();
            document.getElementById('pageLabel').innerText = 'Loading...';
            document.getElementById('pageLabelBot').innerText = 'Loading...';
        } else {
            const o = document.getElementById('loading-overlay');
            if (o) o.innerText = attempt === 1 ? 'PREPARING GALLERY...' : `CONNECTING... ${attempt}/5`;
        }

        try {
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), 40000);
            const res = await fetch("https://jandapress.onrender.com/pururin/get?book=" + id, { signal: controller.signal });
            clearTimeout(tid);
            const data = await res.json();
            const d = data.data || data;
            const loaded = Array.isArray(d.image) ? d.image : (Array.isArray(d.cover) ? d.cover : (d.reader || []));
            if (loaded.length > 0) {
                pages = loaded;
                sessionStorage.setItem('pages_' + id, JSON.stringify(pages));
                currentIndex = Math.min(startPage, pages.length - 1);
                const thumb = typeof d.cover === 'string' ? d.cover : (passedCover ? decodeURIComponent(passedCover) : pages[0]);
                trackHistory({ id, title: d.title || '', cover: thumb });
                removeOverlay();
                updateDisplay();
            } else {
                if (attempt < 5) setTimeout(() => load(attempt + 1), 3000);
                else if (!passedCover) { const o = document.getElementById('loading-overlay'); if(o) o.innerText = 'NO PAGES FOUND.'; }
            }
        } catch(e) {
            if (attempt < 5) setTimeout(() => load(attempt + 1), 4000);
            else if (!passedCover) {
                const o = document.getElementById('loading-overlay');
                if (o) o.innerHTML = 'CONNECTION ERROR.<br><br><span onclick="load(1)" style="color:#ed2553;cursor:pointer;">TAP TO RETRY</span>';
            }
        }
    }

    load();
</script>
</body>
