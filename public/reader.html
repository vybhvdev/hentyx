<script>
// Ad Manager - frequency capping + geo + session tracking
window.HentyxAds = (function() {
    var POP_KEY = 'hx_pop_ts';
    var SESSION_KEY = 'hx_session_interactions';
    var PUSH_SHOWN_KEY = 'hx_push_shown';
    var POP_COOLDOWN = 24 * 60 * 60 * 1000; // 24h

    function getInteractions() { return parseInt(sessionStorage.getItem(SESSION_KEY) || '0'); }
    function bumpInteraction() { sessionStorage.setItem(SESSION_KEY, getInteractions() + 1); }
    function canShowPop() {
        var last = localStorage.getItem(POP_KEY);
        return !last || (Date.now() - parseInt(last)) > POP_COOLDOWN;
    }
    function markPopShown() { localStorage.setItem(POP_KEY, Date.now()); }
    function canShowPush() { return !localStorage.getItem(PUSH_SHOWN_KEY); }
    function markPushShown() { localStorage.setItem(PUSH_SHOWN_KEY, '1'); }

    function triggerPop() {
        if (canShowPop()) {
            markPopShown();
            // popunder fires via its own script on page load
        }
    }

    function onInteraction() {
        bumpInteraction();
        var n = getInteractions();
        // Trigger push prompt on 2nd interaction
        if (n === 2 && canShowPush()) {
            markPushShown();
            // PropellerAds push script handles the prompt
        }
    }

    // Track clicks globally
    document.addEventListener('click', onInteraction, { once: false, passive: true });

    return { triggerPop: triggerPop, onInteraction: onInteraction };
})();
</script>

    <script>
        let pages = [];
        let currentIndex = parseInt(new URLSearchParams(location.search).get("p")) || 0;
        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        let viewMode = 'page';

        function setMode(mode) {
            viewMode = mode;
            document.getElementById('pageBtn').classList.toggle('active', mode === 'page');
            document.getElementById('stripBtn').classList.toggle('active', mode === 'strip');
            document.getElementById('viewer').style.display = mode === 'page' ? 'flex' : 'none';
            document.querySelector('.nav-bar.bottom').style.display = mode === 'page' ? 'flex' : 'none';
            const strip = document.getElementById('strip-view');
            if (mode === 'strip') {
                strip.style.display = 'flex';
                if (strip.children.length === 0) {
                    pages.forEach((url, i) => {
                        const img = document.createElement('img');
                        img.src = url.startsWith('/api/proxy') ? url : `/api/proxy?url=${encodeURIComponent(url)}`;
                        img.loading = 'lazy';
                        strip.appendChild(img);
                    });
                }
            } else {
                strip.style.display = 'none';
            }
        }

        // Use preloaded pages from gallery page if available
        function loadFromCache() {
            const cached = sessionStorage.getItem('pages_' + id);
            if (cached) {
                pages = JSON.parse(cached);
                const overlay = document.getElementById('loading-overlay');
                if (overlay) overlay.remove();
                updateDisplay();
                return true;
            }
            return false;
        }

        async function load(attempt) {
            attempt = attempt || 1;
            const overlay = document.getElementById("loading-overlay");
            const params2 = new URLSearchParams(location.search);
            const passedCover = params2.get("cover");

            // Show cover immediately as page 1 while we wait for full list
            if (attempt === 1 && passedCover) {
                pages = ['/api/proxy?url=' + passedCover];
                if (overlay) overlay.remove();
                updateDisplay();
    
                document.getElementById("pageLabelBottom").innerText = "Loading...";
            } else if (overlay) {
                overlay.innerText = attempt === 1 ? "PREPARING GALLERY..." : "CONNECTING... " + attempt + "/5";
            }

            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), 40000);
                const res = await fetch("https://jandapress.onrender.com/pururin/get?book=" + id, { signal: controller.signal });
                clearTimeout(tid);
                const data = await res.json();
                const d = data.data || data;
                const loaded = Array.isArray(d.image) ? d.image : (Array.isArray(d.cover) ? d.cover : (d.reader || d.images || []));
                if (loaded.length > 0) {
                    pages = loaded;
                    const thumb = typeof d.cover === "string" ? d.cover : (passedCover || pages[0] || "");
                    trackHistory({ id: id, title: d.title || "", cover: thumb });
                    if (overlay) overlay.remove();
                    updateDisplay();
                } else {
                    if (attempt < 5) setTimeout(function(){ load(attempt + 1); }, 3000);
                    else if (!passedCover) {
                        const o = document.getElementById("loading-overlay");
                        if (o) o.innerText = "NO PAGES FOUND.";
                    }
                }
            } catch(e) {
                if (attempt < 5) {
                    setTimeout(function(){ load(attempt + 1); }, 4000);
                } else if (!passedCover) {
                    const o = document.getElementById("loading-overlay");
                    if (o) o.innerHTML = 'CONNECTION ERROR.<br><br><span onclick="load(1)" style="color:#ed2553;font-size:13px;cursor:pointer;">TAP TO RETRY</span>';
                }
            }
        }
            function updateDisplay() {
            const img = document.getElementById('page-img');
            const url = pages[currentIndex];
            img.src = url.startsWith('/api/proxy') ? url : `/api/proxy?url=${encodeURIComponent(url)}`;
            
            document.getElementById('pageLabelBottom').innerText = `${currentIndex + 1} / ${pages.length}`;

            window.scrollTo(0, 0);
            preloadNext();
        }

        // PRELOAD LOGIC: Loads the next 3 pages into hidden <img> tags
        function preloadNext() {
            const preloader = document.getElementById('preloader');
            preloader.innerHTML = ''; 
            for (let i = 1; i <= 3; i++) {
                if (currentIndex + i < pages.length) {
                    const preloadImg = new Image();
                    preloadImg.src = `/api/proxy?url=${encodeURIComponent(pages[currentIndex + i])}`;
                }
            }
        }

        function changePage(step) {
            const next = currentIndex + step;
            if (next >= 0 && next < pages.length) {
                currentIndex = next;
                updateDisplay();
            }
        }

        function handleTap(e) {
            const x = e.clientX;
            const width = window.innerWidth;
            if (x < width * 0.4) changePage(-1); // Tap left 40%
            else changePage(1); // Tap right 60%
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changePage(1);
            if (e.key === "ArrowLeft") changePage(-1);
        });

        load();
    </script>
