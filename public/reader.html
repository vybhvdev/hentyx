<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <title>Hentyx Reader</title>
    <style>
        body { background:#000; margin:0; display:flex; flex-direction:column; align-items:center; }
        .page-wrap { width:100%; max-width:800px; margin-bottom:5px; }
        img { width:100%; display:block; min-height:300px; background:#111; }
        .nav-bar { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.8); padding:10px; text-align:left; z-index:10; }
        .btn { color:white; text-decoration:none; font-weight:bold; padding:5px 15px; background:#ed2553; border-radius:4px; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="btn">← Back</a></div>
    <div id="pages" style="margin-top:50px;"></div>

    <script>
        const params = new URLSearchParams(location.search);
        const mangaId = params.get("id");
        const CONSUMET_BASE = "https://private-consumet-api.vercel.app/manga/mangapill";

        async function loadManga() {
            try {
                // 1. Get Info to find the first chapter ID
                const infoRes = await fetch(`${CONSUMET_BASE}/info?id=${mangaId}`);
                const info = await infoRes.json();
                const firstChapterId = info.chapters[0].id;

                // 2. Get Chapter Pages
                const pagesRes = await fetch(`${CONSUMET_BASE}/read?chapterId=${firstChapterId}`);
                const pages = await pagesRes.json();

                const container = document.getElementById("pages");
                container.innerHTML = pages.map(p => `
                    <div class="page-wrap">
                        <img src="${p.img}" loading="lazy">
                    </div>
                `).join('');
            } catch (e) {
                console.error("Reader failed:", e);
            }
        }
        if(mangaId) loadManga();
    </script>
</body>
</html>
