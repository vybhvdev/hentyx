<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reader</title>

<style>

body{
background:black;
margin:0;
font-family:Arial;
}

/* TOP BAR */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:40px;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
z-index:1000;
font-size:14px;
}

/* PROGRESS BAR */

#progress{
position:fixed;
top:40px;
left:0;
height:3px;
background:#e63946;
width:0%;
z-index:1000;
}

/* READER */

#reader{
margin-top:45px;
}

img{
width:100%;
display:block;
}

/* NAV BUTTONS */

.nav{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:10px;
}

button{
background:#222;
color:white;
border:0;
padding:10px 14px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="topbar">
<span id="counter">1 / ?</span>
<a href="/" style="color:white;text-decoration:none">Home</a>
</div>

<div id="progress"></div>

<div id="reader"></div>

<div class="nav">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<script>

let id=new URLSearchParams(location.search).get("id")

let images=[]
let current=0

fetch("/api/gallery/"+id)
.then(r=>r.json())
.then(g=>{

images=g.images

const reader=document.getElementById("reader")

images.forEach(src=>{
let img=document.createElement("img")
img.loading="lazy"
img.src=src
reader.appendChild(img)
})

update()

})

function update(){

document.getElementById("counter").innerText=
(current+1)+" / "+images.length

document.getElementById("progress").style.width=
((current+1)/images.length*100)+"%"

window.scrollTo({
top:document.querySelectorAll("#reader img")[current].offsetTop,
behavior:"smooth"
})

}

function next(){
if(current<images.length-1){
current++
update()
}
}

function prev(){
if(current>0){
current--
update()
}
}

window.addEventListener("scroll",()=>{

let imgs=document.querySelectorAll("#reader img")

imgs.forEach((img,i)=>{
if(window.scrollY>=img.offsetTop-200){
current=i
}
})

document.getElementById("counter").innerText=
(current+1)+" / "+images.length

document.getElementById("progress").style.width=
((current+1)/images.length*100)+"%"

})

</script>

<script src="/ui-fix.js"></script>
</body>
</html>
