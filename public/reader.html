<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hentyx Reader</title>
    <style>
        :root { --bg: #212121; --nav-bg: #1f1f1f; --accent: #ed2553; }
        body { background: var(--bg); margin: 0; padding: 0; font-family: sans-serif; overflow-x: hidden; color: #fff; }
        
        /* nhentai Style Top/Bottom Nav */
        .nav-bar { background: var(--nav-bg); padding: 10px; display: flex; justify-content: center; align-items: center; gap: 15px; border-bottom: 1px solid #333; font-size: 14px; font-weight: bold; }
        .nav-bar.bottom { border-top: 1px solid #333; border-bottom: none; position: relative; margin-top: 10px; padding-bottom: 20px; }
        
        .nav-btn { color: #fff; text-decoration: none; padding: 5px 10px; background: #333; border-radius: 4px; cursor: pointer; transition: 0.2s; border: none; font-size: 18px; }
        .nav-btn:hover { background: #444; }
        .nav-btn.home { position: absolute; left: 15px; font-size: 14px; background: transparent; color: var(--accent); }

        #viewer { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px 0; position: relative; }
        #page-img { width: 100%; max-width: 800px; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Preload container (Hidden) */
        #preloader { display: none; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; font-family: monospace; color: var(--accent); }
    </style>
</head>
<body>

    <div id="loading-overlay">PREPARING GALLERY...</div>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn home">BACK</a>
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <span id="pageLabelTop">1 of 0</span>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>

    <div id="viewer" onclick="handleTap(event)">
        <img id="page-img" src="">
    </div>

    <div class="nav-bar bottom">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <span id="pageLabelBottom">1 of 0</span>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>

    <div id="preloader"></div>

    <script>
        let pages = [];
        let currentIndex = parseInt(new URLSearchParams(location.search).get("p")) || 0;
        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        async function load() {
            try {
                const res = await fetch(`/api/info?id=${id}`);
                const data = await res.json();
                
                // YOUR FIX: The essential mapping
                pages = (data.pages && data.pages.length > 0) ? data.pages : (Array.isArray(data.cover) ? data.cover : []);
                
                if (pages.length > 0) {
                    document.getElementById("loading-overlay").remove();
                    updateDisplay();
                } else {
                    document.getElementById("loading-overlay").innerText = "NO PAGES FOUND.";
                }
            } catch (e) { document.getElementById("loading-overlay").innerText = "CONNECTION ERROR."; }
        }

        function updateDisplay() {
            const img = document.getElementById('page-img');
            const url = pages[currentIndex];
            img.src = `/api/proxy?url=${encodeURIComponent(url)}`;
            
            const label = `${currentIndex + 1} of ${pages.length}`;
            document.getElementById('pageLabelTop').innerText = label;
            document.getElementById('pageLabelBottom').innerText = label;

            window.scrollTo(0, 0);
            preloadNext();
        }

        // PRELOAD LOGIC: Loads the next 3 pages into hidden <img> tags
        function preloadNext() {
            const preloader = document.getElementById('preloader');
            preloader.innerHTML = ''; 
            for (let i = 1; i <= 3; i++) {
                if (currentIndex + i < pages.length) {
                    const preloadImg = new Image();
                    preloadImg.src = `/api/proxy?url=${encodeURIComponent(pages[currentIndex + i])}`;
                }
            }
        }

        function changePage(step) {
            const next = currentIndex + step;
            if (next >= 0 && next < pages.length) {
                currentIndex = next;
                updateDisplay();
            }
        }

        function handleTap(e) {
            const x = e.clientX;
            const width = window.innerWidth;
            if (x < width * 0.4) changePage(-1); // Tap left 40%
            else changePage(1); // Tap right 60%
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changePage(1);
            if (e.key === "ArrowLeft") changePage(-1);
        });

        load();
    </script>
</body>
</html>
