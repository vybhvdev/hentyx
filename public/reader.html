<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Reader</title>
    <style>body{background:#000;margin:0;} img{width:100%;display:block;min-height:300px;}</style>
</head>
<body>
<div id="reader"></div>
<script>
    let id = new URLSearchParams(location.search).get("id");
    fetch("/api/gallery/"+id).then(r=>r.json()).then(g=>{
        const r = document.getElementById("reader");
        g.images.forEach(src => {
            let cleanUrl = src.replace('https://', '');
            let img = document.createElement("img");
            img.src = "https://images.weserv.nl/?url=" + cleanUrl;
            img.loading = "lazy";
            r.appendChild(img);
        });
    });
</script>
</body>
</html>
