<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <title>EH Reader</title>
</head>
<body style="background:#000; margin:0;">
    <div id="pages" style="display:flex; flex-direction:column; align-items:center;"></div>
    <script>
        const params = new URLSearchParams(location.search);
        const gid = params.get("gid");
        const token = params.get("token");

        async function load() {
            const r = await fetch(`/api/gallery/${gid}/${token}`);
            const data = await r.json();
            const container = document.getElementById("pages");

            // EH images are tricky. If you don't have page tokens, 
            // we use the 's' link bypass or a proxy.
            for(let i=1; i<=data.filecount; i++) {
                const img = document.createElement("img");
                // NOTE: This is a placeholder logic. EH requires page tokens
                // for full direct image access.
                img.src = `https://ehgt.org/m/${data.gid}/${i}.jpg`; 
                img.style.width = "100%";
                container.appendChild(img);
            }
        }
        load();
    </script>
</body>
</html>
