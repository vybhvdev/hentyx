<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentyx Reader</title>
    <style>
        body { background:#000; margin:0; display:flex; flex-direction:column; align-items:center; font-family: sans-serif; }
        .page-wrap { width:100%; max-width:900px; }
        img { width:100%; display:block; min-height:400px; background:#0a0a0a; }
        .nav-bar { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.9); padding:12px; display: flex; justify-content: space-between; z-index:100; border-bottom: 1px solid #ff00ff; box-sizing: border-box; }
        .btn { color:#ff00ff; text-decoration:none; font-weight:bold; padding:8px 12px; background:#111; border-radius:4px; font-size: 0.8rem; border: 1px solid #333; }
        #loading { color: #ff00ff; margin-top: 100px; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="javascript:history.back()" class="btn">← BACK</a><a href="index.html" class="btn">HOME</a></div>
    <div id="loading">LOADING...</div>
    <div id="pages" style="margin-top:55px; width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    <script>
        async function load() {
            const id = new URLSearchParams(location.search).get("id");
            try {
                const res = await fetch(`/api/info?id=${id}`);
                const data = await res.json();
                
                // WORKAROUND: If pages is empty, check if cover is the array instead
                const finalPages = (data.pages && data.pages.length > 0) ? data.pages : (Array.isArray(data.cover) ? data.cover : []);
                
                if (finalPages.length > 0) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("pages").innerHTML = finalPages.map(url => 
                        `<div class="page-wrap"><img src="/api/proxy?url=${encodeURIComponent(url)}" loading="lazy"></div>`
                    ).join('');
                } else {
                    document.getElementById("loading").innerText = "NO PAGES FOUND.";
                }
            } catch (e) { document.getElementById("loading").innerText = "FETCH ERROR."; }
        }
        load();
    </script>
</body>
</html>
