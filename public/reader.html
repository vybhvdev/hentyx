<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hentyx Reader</title>
    <style>
        :root { --accent: #ff00ff; }
        body { background: #000; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; height: 100vh; color: #fff; }
        
        .nav-bar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: flex; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--accent); transition: 0.3s; }
        .nav-bar.hidden { transform: translateY(-100%); }
        .btn { color: var(--accent); text-decoration: none; font-weight: bold; padding: 8px 12px; background: #111; border-radius: 4px; border: 1px solid #333; font-size: 12px; }

        #viewer { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #page-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .tap-zone { position: absolute; top: 0; height: 100%; z-index: 50; }
        #prev-zone { left: 0; width: 35%; }
        #next-zone { right: 0; width: 65%; }

        .footer { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid var(--accent); z-index: 100; pointer-events: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>
    <div class="nav-bar" id="topNav">
        <a href="javascript:history.back()" class="btn">← BACK</a>
        <a href="index.html" class="btn">HOME</a>
    </div>

    <div id="loading">LOADING...</div>

    <div id="viewer">
        <div id="prev-zone" class="tap-zone" onclick="changePage(-1)"></div>
        <div id="next-zone" class="tap-zone" onclick="changePage(1)"></div>
        <img id="page-img" src="" style="display:none;" onclick="toggleUI()">
    </div>

    <div class="footer" id="pageCounter">0 / 0</div>

    <script>
        let pages = [];
        let currentIndex = 0;
        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        async function load() {
            try {
                const res = await fetch(`/api/info?id=${id}`);
                const data = await res.json();
                
                // YOUR FIX: Check cover first if pages is empty
                pages = (data.pages && data.pages.length > 0) ? data.pages : (Array.isArray(data.cover) ? data.cover : []);
                
                if (pages.length > 0) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("page-img").style.display = "block";
                    updateDisplay();
                } else {
                    document.getElementById("loading").innerText = "NO PAGES FOUND.";
                }
            } catch (e) { document.getElementById("loading").innerText = "FETCH ERROR."; }
        }

        function updateDisplay() {
            const img = document.getElementById('page-img');
            const url = pages[currentIndex];
            img.src = `/api/proxy?url=${encodeURIComponent(url)}`;
            document.getElementById('pageCounter').innerText = `${currentIndex + 1} / ${pages.length}`;
            
            // Auto-hide UI
            setTimeout(() => document.getElementById('topNav').classList.add('hidden'), 2000);
        }

        function changePage(step) {
            const next = currentIndex + step;
            if (next >= 0 && next < pages.length) {
                currentIndex = next;
                updateDisplay();
                // Preload next image
                if(next + 1 < pages.length) {
                    const nextImg = new Image();
                    nextImg.src = `/api/proxy?url=${encodeURIComponent(pages[next + 1])}`;
                }
            }
        }

        function toggleUI() {
            document.getElementById('topNav').classList.toggle('hidden');
        }

        load();
    </script>
</body>
</html>
