<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popular - Hentyx</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <style>
    :root { --bg: #0a0a0a; --surface: #161616; --accent: #ed2553; --text: #e5e5e5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; }
    header { background: #000; padding: 12px 15px; border-bottom: 1px solid var(--accent); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .back { color: var(--accent); text-decoration: none; font-size: 20px; }
    .brand { font-size: 20px; font-weight: 900; color: var(--accent); flex: 1; text-align: center; margin-right: 32px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    .section-label { font-size: 11px; text-transform: uppercase; color: #555; letter-spacing: 2px; margin: 15px 0 12px; border-left: 3px solid var(--accent); padding-left: 10px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
    .card { background: var(--surface); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; border: 1px solid #1a1a1a; position: relative; }
    .rank { position: absolute; top: 6px; left: 6px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 900; padding: 3px 7px; border-radius: 3px; z-index: 2; }
    .cover-wrap { position: relative; padding-top: 140%; background: #000; }
    .card img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
    .card-title { padding: 8px; font-size: 10px; line-height: 1.2; height: 28px; overflow: hidden; text-align: center; color: #bbb; }
    .skeleton { background: linear-gradient(90deg, #161616 25%, #222 50%, #161616 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-card { border-radius: 4px; overflow: hidden; border: 1px solid #1a1a1a; }
    .skel-img { padding-top: 140%; }
    .skel-txt { height: 28px; margin: 8px; border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back">←</a>
    <span class="brand">HENTY<span style="color:#fff">X</span></span>
  </header>
  <div class="container">
    <div class="section-label">🔥 Most Popular</div>
    <div class="grid" id="grid">
      ${Array(12).fill(0).map(() => `
        <div class="skel-card">
          <div class="skel-img skeleton"></div>
          <div class="skel-txt skeleton"></div>
        </div>`).join('')}
    </div>
  </div>
  <script>
    const proxy = url => `/api/proxy?url=${encodeURIComponent(url)}`;

    async function loadPopular() {
      try {
        const res = await fetch('https://jandapress.onrender.com/pururin/search?key=popular&page=1');
        const raw = await res.json();
        const data = (raw.data || []).map(m => ({id: m.id||m.code, title: m.title, cover: m.image||m.cover}));
        document.getElementById('grid').innerHTML = data.map((m, i) => `
          <a href="gallery.html?id=${m.id}&cover=${encodeURIComponent(m.cover)}" class="card">
            <div class="cover-wrap">
              <span class="rank">#${i + 1}</span>
              <img src="${proxy(m.cover)}" loading="lazy">
            </div>
            <div class="card-title">${m.title}</div>
          </a>
        `).join('');
      } catch(e) {
        document.getElementById('grid').innerHTML = '<p style="color:#444; padding:40px; text-align:center;">Failed to load.</p>';
      }
    }

    loadPopular();
  </script>
</body>
</html>
