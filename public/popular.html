<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Popular - Hentyx</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:sans-serif;">
    <header style="background:#222; padding:15px; border-bottom:2px solid #ed2553;">
        <a href="/" style="color:#ed2553; text-decoration:none; font-weight:bold; font-size:20px;">POPULAR</a>
    </header>
    <div class="container"><div id="popularGrid" class="gallery-grid" style="padding:20px;"></div></div>
    <script>
        fetch('/api/galleries').then(r=>r.json()).then(data=>{
            const popular = data.items.slice(0, 20); // Top 20 as popular
            document.getElementById('popularGrid').innerHTML = popular.map(g => `
                <div class="cover" onclick="location.href='reader.html?id=${g.id}'">
                    <img src="${g.images[0]}">
                    <div class="caption">${g.title}</div>
                </div>`).join('');
        });
    </script>
</body>
</html>
