name: Keep Hentyx Awake
on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes to beat Render's 15-min sleep
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Site
        run: curl -I https://hentyx.onrender.com
        
